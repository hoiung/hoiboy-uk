# Hugo site config. Single source of truth.
# Hugo version: pinned in /.hugo-version (read by CI and Cloudflare).
# Theme: NONE. We ship a minimal custom theme inside layouts/ + assets/.

baseURL = "https://hoiboy.uk"
languageCode = "en-gb"
title = "hoiboy.uk"
enableRobotsTXT = true
enableEmoji = false
disableHugoGeneratorInject = true

# Build hardening
[build]
  noJSConfigInAssets = true

# Output formats: HTML + RSS + sitemap (Hugo defaults), no JSON.
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# Categories primary, tags secondary. Per docs/research/06_TAXONOMY.md.
# `series` taxonomy added 2026-04-26 (Issue #3) for grouping multi-post sequences
# (bake-off teaser + future results posts). Term page renders via
# layouts/series/term.html (Hugo lookup chain: series/term.html >
# _default/term.html > _default/taxonomy.html). Posts opt-in via
# `series: <name>` + `order: <int>` frontmatter.
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Permalinks for tags taxonomy. Categories use section landings instead
# of taxonomy permalink rewrite (avoids section vs taxonomy collision).
[permalinks]
  tags = "/tags/:slug/"

# Pagination for taxonomy term pages (food-booze/, tech-ai/, etc).
# Future-proofs for thousands of posts per category.
[pagination]
  pagerSize = 50

# Minify: keep quotes on integrity/crossorigin attributes (SRI)
[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepQuotes = true

[markup]
  [markup.goldmark.renderer]
    unsafe = false
  [markup.highlight]
    style = "github"
    noClasses = false
    lineNos = false
