<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img" aria-label="Data flows left to right through Step 1 and Step 2 to a result. Each step should drop a breadcrumb onto the log trail below. Step 1 is logged, Step 2 fails silently with no log, so the data is swallowed and never reaches the result." font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0533a"/>
    </marker>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .trailstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
        .trailstroke { stroke: #6a6a6a; }
      }
    </style>
  </defs>

  <!-- own background so text contrast holds on any host -->
  <rect x="0" y="0" width="880" height="360" class="bg"/>

  <!-- title -->
  <text x="440" y="30" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2.5">FOLLOWING THE BREADCRUMBS</text>

  <!-- boxes -->
  <!-- INPUT -->
  <rect x="20" y="72" width="120" height="64" rx="10" class="card accentstroke" stroke-width="2.5"/>
  <text x="80" y="110" text-anchor="middle" class="label" font-size="17">INPUT</text>

  <!-- STEP 1 -->
  <rect x="210" y="72" width="140" height="64" rx="10" class="card boxstroke" stroke-width="1.8"/>
  <text x="280" y="102" text-anchor="middle" class="label" font-size="16">Step 1</text>
  <text x="280" y="121" text-anchor="middle" class="muted" font-size="12.5">process</text>

  <!-- STEP 2 (silent failure) -->
  <rect x="420" y="72" width="140" height="64" rx="10" class="card accentstroke" stroke-width="2.2"/>
  <text x="490" y="102" text-anchor="middle" class="label" font-size="16">Step 2</text>
  <text x="490" y="121" text-anchor="middle" class="accent" font-size="12.5" font-weight="600">fails silently</text>

  <!-- RESULT (never arrives) -->
  <rect x="710" y="72" width="150" height="64" rx="10" class="card boxstroke" stroke-width="1.8" stroke-dasharray="5 5"/>
  <text x="785" y="102" text-anchor="middle" class="muted" font-size="17" font-weight="600">RESULT?</text>
  <text x="785" y="121" text-anchor="middle" class="accent" font-size="12.5">never arrives</text>

  <!-- flow arrows -->
  <line x1="140" y1="104" x2="208" y2="104" class="accentstroke" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="350" y1="104" x2="418" y2="104" class="accentstroke" stroke-width="2.2" marker-end="url(#arrow)"/>
  <!-- broken flow to result -->
  <line x1="560" y1="104" x2="708" y2="104" class="accentstroke" stroke-width="2.2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- log trail -->
  <text x="20" y="208" class="muted" font-size="12.5" font-weight="600" letter-spacing="1.5">LOG TRAIL</text>
  <line x1="20" y1="222" x2="860" y2="222" class="trailstroke" stroke-width="1.5" stroke-dasharray="2 5"/>

  <!-- breadcrumb under INPUT -->
  <line x1="80" y1="136" x2="80" y2="216" class="trailstroke" stroke-width="1.2"/>
  <circle cx="80" cy="222" r="6" class="ok"/>
  <text x="80" y="250" text-anchor="middle" class="muted" font-size="12.5">logged</text>

  <!-- breadcrumb under STEP 1 -->
  <line x1="280" y1="136" x2="280" y2="216" class="trailstroke" stroke-width="1.2"/>
  <circle cx="280" cy="222" r="6" class="ok"/>
  <text x="280" y="250" text-anchor="middle" class="muted" font-size="12.5">logged</text>

  <!-- breadcrumb under STEP 2 (missing) -->
  <line x1="490" y1="136" x2="490" y2="210" class="accentstroke" stroke-width="1.2" stroke-dasharray="4 4"/>
  <circle cx="490" cy="222" r="7" fill="none" class="accentstroke" stroke-width="2"/>
  <line x1="486" y1="218" x2="494" y2="226" class="accentstroke" stroke-width="2"/>
  <line x1="494" y1="218" x2="486" y2="226" class="accentstroke" stroke-width="2"/>
  <text x="490" y="250" text-anchor="middle" class="accent" font-size="12.5" font-weight="600">no log</text>
  <text x="490" y="268" text-anchor="middle" class="accent" font-size="12.5">data swallowed</text>

  <!-- verdict line -->
  <text x="440" y="330" text-anchor="middle" font-size="14.5">
    <tspan class="muted">every step should leave a breadcrumb.</tspan><tspan class="accent" font-weight="700" dx="12">a gap with no log &#8594; data vanishes.</tspan>
  </text>
</svg>
