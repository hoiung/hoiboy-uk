<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 272" width="900" height="272" role="img" aria-label="The backtest pipeline" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0533a"/>
    </marker>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .trailstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
        .trailstroke { stroke: #6a6a6a; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="272" class="bg"/>
  <text x="885" y="24" text-anchor="end" class="watermark" font-size="11" font-weight="400" letter-spacing="0.5">hoiboy.uk</text>

  <text x="450" y="30" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">HOW A BACKTEST RUNS</text>
  <text x="450" y="52" text-anchor="middle" class="muted" font-size="11.5">every strategy is tested against years of history before it goes near real money.</text>

  <rect class="card boxstroke" x="18" y="86" width="186" height="92" rx="10" stroke-width="1.8"/>
  <text class="label" x="111" y="124" text-anchor="middle" font-size="14">Price history</text>
  <text class="muted" x="111" y="145" text-anchor="middle" font-size="11.5">years of it,</text>
  <text class="muted" x="111" y="161" text-anchor="middle" font-size="11.5">via yfinance</text>

  <rect class="card boxstroke" x="244" y="86" width="186" height="92" rx="10" stroke-width="1.8"/>
  <text class="label" x="337" y="124" text-anchor="middle" font-size="14">Smart layers</text>
  <text class="muted" x="337" y="145" text-anchor="middle" font-size="11.5">work out the settings</text>
  <text class="muted" x="337" y="161" text-anchor="middle" font-size="11.5">for each stock</text>

  <rect class="card boxstroke" x="470" y="86" width="186" height="92" rx="10" stroke-width="1.8"/>
  <text class="label" x="563" y="124" text-anchor="middle" font-size="14">vectorbt engine</text>
  <text class="muted" x="563" y="145" text-anchor="middle" font-size="11.5">simulates the trades</text>
  <text class="muted" x="563" y="161" text-anchor="middle" font-size="11.5">across the history</text>

  <rect class="card accentstroke" x="696" y="86" width="186" height="92" rx="10" stroke-width="2.5"/>
  <text class="label" x="789" y="124" text-anchor="middle" font-size="14">Graded result</text>
  <text class="muted" x="789" y="145" text-anchor="middle" font-size="11.5">scored and saved</text>
  <text class="muted" x="789" y="161" text-anchor="middle" font-size="11.5">to the database</text>

  <line x1="204" y1="132" x2="242" y2="132" class="accentstroke" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="132" x2="468" y2="132" class="accentstroke" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="656" y1="132" x2="694" y2="132" class="accentstroke" stroke-width="2.2" marker-end="url(#arrow)"/>

  <text x="450" y="240" text-anchor="middle" font-size="14"><tspan class="muted">Price history in, a graded result out. </tspan><tspan class="accent" font-weight="700" dx="6">no strategy goes live untested.</tspan></text>
</svg>
