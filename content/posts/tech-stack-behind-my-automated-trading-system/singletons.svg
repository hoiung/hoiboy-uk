<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460" role="img" aria-label="How the redundancy managers keep the single-copy processes alive" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0533a"/>
    </marker>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .trailstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
        .trailstroke { stroke: #6a6a6a; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="460" class="bg"/>
  <text x="885" y="24" text-anchor="end" class="watermark" font-size="11" font-weight="400" letter-spacing="0.5">hoiboy.uk</text>

  <text x="450" y="30" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">THE ONES WITHOUT A SPARE</text>
  <text x="450" y="52" text-anchor="middle" class="muted" font-size="11.5">the same managers also babysit the single-copy processes. no spare to flip to, so they just restart.</text>

  <!-- the manager pair, carried over from the previous diagram -->
  <rect class="card boxstroke" x="300" y="86" width="300" height="66" rx="10" stroke-width="1.8"/>
  <text class="label" x="450" y="116" text-anchor="middle" font-size="14">Redundancy Managers</text>
  <text class="muted" x="450" y="138" text-anchor="middle" font-size="11.5">the same pair · leader + backup</text>

  <!-- watch links: manager pair down to each singleton -->
  <line x1="400" y1="153" x2="180" y2="242" class="trailstroke" stroke-width="1.3" stroke-dasharray="5 4"/>
  <line x1="450" y1="153" x2="450" y2="242" class="trailstroke" stroke-width="1.3" stroke-dasharray="5 4"/>
  <line x1="500" y1="153" x2="720" y2="242" class="trailstroke" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text class="muted" x="300" y="205" font-size="10">watches</text>
  <text class="muted" x="600" y="205" text-anchor="end" font-size="10">health-check every 30s</text>

  <!-- singleton: dashboard -->
  <rect class="card boxstroke" x="60" y="244" width="210" height="100" rx="10" stroke-width="1.8"/>
  <text class="label" x="165" y="282" text-anchor="middle" font-size="14">Dashboard</text>
  <text class="muted" x="165" y="304" text-anchor="middle" font-size="11.5">React UI · what I see</text>
  <text class="muted" x="165" y="326" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="1.5">NO SPARE</text>

  <!-- singleton: paper controller -->
  <rect class="card boxstroke" x="345" y="244" width="210" height="100" rx="10" stroke-width="1.8"/>
  <text class="label" x="450" y="282" text-anchor="middle" font-size="14">Paper Controller</text>
  <text class="muted" x="450" y="304" text-anchor="middle" font-size="11.5">fake money</text>
  <text class="muted" x="450" y="326" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="1.5">NO SPARE</text>

  <!-- singleton: live controller, watched closest (real money) -->
  <rect class="card accentstroke" x="630" y="244" width="210" height="100" rx="10" stroke-width="2.5"/>
  <text class="label" x="735" y="282" text-anchor="middle" font-size="14">Live Controller</text>
  <text class="accent" x="735" y="304" text-anchor="middle" font-size="11.5" font-weight="700">real money</text>
  <text class="muted" x="735" y="326" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="1.5">NO SPARE</text>

  <!-- restart-in-place loops: one per singleton -->
  <path d="M145,344 C125,384 205,384 185,346" class="accentstroke" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="muted" x="165" y="398" text-anchor="middle" font-size="10">restart in place</text>

  <path d="M430,344 C410,384 490,384 470,346" class="accentstroke" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="muted" x="450" y="398" text-anchor="middle" font-size="10">restart in place</text>

  <path d="M715,344 C695,384 775,384 755,346" class="accentstroke" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="muted" x="735" y="398" text-anchor="middle" font-size="10">restart in place</text>

  <text x="450" y="436" text-anchor="middle" font-size="14"><tspan class="muted">No failover here, just one of each. </tspan><tspan class="accent" font-weight="700" dx="6">if one falls over, a manager stands it back up.</tspan></text>
</svg>
