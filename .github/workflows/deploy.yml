name: Deploy

# Triggered ONLY when CI passes on main. Posts the Cloudflare Pages deploy hook.
# Cloudflare Pages auto-build on push is disabled, so this is the sole prod
# trigger. The hook is stored as the CF_PAGES_DEPLOY_HOOK secret.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read

# Serialise overlapping deploys. If two pushes land in quick succession,
# the second deploy waits for the first to finish (no cancel-in-progress).
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Assert deploy hook secret present
        env:
          HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::CF_PAGES_DEPLOY_HOOK secret is unset. Configure in repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Trigger Cloudflare Pages deploy hook
        env:
          HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          set -e
          # Defence-in-depth: tell Actions to mask the hook URL in any log
          # output even if Cloudflare echoes it back in an error response
          # (GHA auto-masks exact secrets by default, but scrubbing prefix
          # + host + path individually catches partial quotations too).
          echo "::add-mask::$HOOK"
          RESP=$(curl -fSs -X POST "$HOOK")
          # Validate response robustly for BOTH JSON and non-JSON shapes.
          # Real Cloudflare Pages deploy-hook reply shape (verified via
          # post-merge CI run 24898325438 on 2026-04-24):
          #   {"result": {"id": "<uuid>"}, "success": true, "errors": [], "messages": []}
          # Errors may be plaintext or HTML — jq parse-fail falls through to
          # the shell fallback that exits loudly. Scrubbed echo: print only
          # HTTP success signal + body-length, NOT the raw body (Stage 5 L1-C
          # hardening — avoids leaking the hook URL if CF ever quotes it).
          if echo "$RESP" | jq -e '.success == true' >/dev/null 2>&1; then
            echo "Cloudflare deploy hook: success (body length $(printf %s "$RESP" | wc -c) bytes)"
          else
            BYTES=$(printf %s "$RESP" | wc -c)
            echo "::error::Cloudflare deploy hook returned non-OK / non-JSON (body=${BYTES} bytes). Inspect run logs via secure channel."
            exit 1
          fi
