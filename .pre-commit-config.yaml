# Minimum useful set for a markdown-first Hugo blog.
# Source rationale: docs/research/03_PRECOMMIT_DECISIONS.md
exclude: '^themes/'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--fix, --config, .markdownlint.json]
        files: ^(content|docs)/.*\.md$

  - repo: local
    hooks:
      - id: frontmatter-validator
        name: Validate post frontmatter
        entry: python3 scripts/validate_frontmatter.py
        language: system
        pass_filenames: false
        files: ^content/posts/.*\.md$
      - id: config-traceability
        name: Config traceability check
        entry: python3 scripts/check_config_traceability.py
        language: system
        pass_filenames: false
        files: ^(config/_default/params\.toml|layouts/.*\.html|assets/.*\.css)$
      - id: check-voice-tells
        name: Voice guard (marker-driven)
        entry: python3 scripts/check-ai-writing-tells.py --check-only-new
        language: system
        pass_filenames: true
        files: ^(content/.*\.md|docs/research/.*\.md)$
      - id: check-wordcount
        name: Word-count ceiling (>3000 fails, skip legacy)
        entry: python3 scripts/check_wordcount.py
        language: system
        pass_filenames: true
        files: ^content/posts/.*/index\.md$
        always_run: false
      - id: voice-rules-drift
        name: Voice rules vendored copy drift check
        entry: bash -c 'if [ -d ../dotfiles ]; then cmp -s ../dotfiles/SST3/scripts/voice_rules.py scripts/voice_rules.py || { echo "[drift] scripts/voice_rules.py differs from canonical at ../dotfiles/SST3/scripts/voice_rules.py"; exit 1; }; else echo "[sync] dotfiles canonical not present, skipping" >&2; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: check-public-repo-secrets
        name: Check for secrets in public repo
        entry: python3 scripts/check-public-repo-secrets.py . --staged-only
        language: system
        pass_filenames: false
        always_run: true

      - id: secret-rules-drift
        name: Secret detection script drift check
        entry: bash
        args:
          - -c
          - 'CANONICAL=../dotfiles/SST3/scripts/check-public-repo-secrets.py; LOCAL=scripts/check-public-repo-secrets.py; [ -f "$CANONICAL" ] || { echo "SKIP dotfiles not found" >&2; exit 0; }; cmp -s "$LOCAL" "$CANONICAL" || { echo "ERROR $LOCAL drifted. Run cp $CANONICAL $LOCAL" >&2; exit 1; }'
        language: system
        pass_filenames: false
        always_run: true

      - id: check-mirror-drift-self-drift
        name: Self-check that vendored check-mirror-drift.py + sst3_mirror_utils.py match canonical
        entry: bash
        args:
          - -c
          - |
            for f in check-mirror-drift.py sst3_mirror_utils.py; do
              CANONICAL=../dotfiles/SST3/scripts/$f
              LOCAL=scripts/$f
              [ -f "$CANONICAL" ] || { echo "SKIP: dotfiles not found — drift check skipped" >&2; exit 0; }
              cmp -s "$LOCAL" "$CANONICAL" || { echo "ERROR: scripts/$f has drifted from canonical. Run: cp $CANONICAL $LOCAL" >&2; exit 1; }
            done
        language: system
        pass_filenames: false
        always_run: true

      - id: sst3-mirror-drift
        name: SST3 vendored file drift check (manifest-driven)
        entry: python3 scripts/check-mirror-drift.py --repo hoiboy-uk
        language: system
        pass_filenames: false
        always_run: true
