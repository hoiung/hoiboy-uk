<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430" role="img" aria-label="The maturity cycle is an inverted U: expectancy rises from dormant accumulation, peaks at the breakout-ready A-A-E zone, then fades through extension to the losing backside" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .trailstroke { stroke: #9aa0a6; }
      .ok { fill: #7aa869; } .bad { fill: #ef4444; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .trailstroke { stroke: #6a6a6a; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="430" class="bg"/>
  <text x="905" y="24.5" text-anchor="end" class="watermark" font-size="11.2" font-weight="400" letter-spacing="0.51">hoiboy.uk</text>

  <text x="460" y="34" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">THE MATURITY CYCLE &#8212; BUY NEAR THE PEAK</text>
  <text x="460" y="58" text-anchor="middle" class="muted" font-size="12" letter-spacing="0.5">average reward (R) by where the stock is in its move</text>

  <!-- zones -->
  <rect x="372" y="78" width="176" height="290" rx="8" fill="#7aa869" fill-opacity="0.10"/>
  <rect x="700" y="78" width="180" height="290" rx="8" fill="#ef4444" fill-opacity="0.09"/>
  <text x="460" y="360" text-anchor="middle" class="ok" font-size="10.5" font-weight="700" letter-spacing="1.5">ENTER ZONE</text>
  <text x="790" y="94" text-anchor="middle" class="bad" font-size="10.5" font-weight="700" letter-spacing="1.5">AVOID</text>

  <!-- 0R baseline -->
  <line x1="80" y1="330" x2="884" y2="330" class="trailstroke" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="72" y="334" text-anchor="end" class="muted" font-size="11">0R</text>

  <!-- the inverted-U curve -->
  <path d="M110,307 C200,200 370,122 460,114 C560,122 700,300 820,352" fill="none" class="accentstroke" stroke-width="3"/>

  <!-- points -->
  <circle cx="110" cy="307" r="5" class="muted" fill="#6a6a6a"/>
  <circle cx="280" cy="158" r="5" class="ok" fill="#7aa869"/>
  <circle cx="460" cy="114" r="7.5" class="accent" fill="#c0533a"/>
  <circle cx="640" cy="278" r="5" class="muted" fill="#6a6a6a"/>
  <circle cx="820" cy="352" r="5.5" class="bad" fill="#ef4444"/>

  <!-- point labels -->
  <text x="110" y="294" text-anchor="middle" class="muted" font-size="12" font-weight="600">E&#183;E&#183;E</text>
  <text x="110" y="323" text-anchor="middle" class="muted" font-size="11">+0.3R</text>

  <text x="280" y="130" text-anchor="middle" class="label" font-size="12">B&#183;B&#183;E</text>
  <text x="280" y="146" text-anchor="middle" class="muted" font-size="11">+2.3R</text>

  <text x="460" y="98" text-anchor="middle" class="accent" font-size="14" font-weight="700">A&#183;A&#183;E  &#43;2.9R</text>
  <text x="460" y="142" text-anchor="middle" class="accent" font-size="10.5" font-weight="700" letter-spacing="1">BREAKOUT-READY</text>

  <text x="640" y="265" text-anchor="middle" class="muted" font-size="12">A&#183;A&#183;A</text>
  <text x="640" y="303" text-anchor="middle" class="muted" font-size="11">+0.7R</text>

  <text x="820" y="339" text-anchor="middle" class="bad" font-size="12" font-weight="600">C&#183;B&#183;A</text>
  <text x="820" y="372" text-anchor="middle" class="bad" font-size="11">&#8722;0.3R</text>

  <!-- phase axis labels -->
  <text x="110" y="398" text-anchor="middle" class="muted" font-size="11.5" letter-spacing="0.5">accumulation</text>
  <text x="280" y="398" text-anchor="middle" class="muted" font-size="11.5" letter-spacing="0.5">building</text>
  <text x="460" y="398" text-anchor="middle" class="accent" font-size="11.5" font-weight="700" letter-spacing="0.5">PEAK</text>
  <text x="640" y="398" text-anchor="middle" class="muted" font-size="11.5" letter-spacing="0.5">extension</text>
  <text x="820" y="398" text-anchor="middle" class="muted" font-size="11.5" letter-spacing="0.5">backside</text>

  <!-- takeaway -->
  <text x="460" y="420" text-anchor="middle" font-size="13.5">
    <tspan class="muted">the ripple peaks, then fades:</tspan><tspan class="accent" font-weight="700" dx="6">enter on the way up, not the way down.</tspan>
  </text>
</svg>
