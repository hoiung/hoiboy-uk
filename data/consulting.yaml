# V2 cash-engine offer architecture (consulting-ops#2 Phase 2).
# Single source of truth for consulting-page external URLs + V2 pricing ladder.
# Referenced from content/consulting/*/index.md as hardcoded literal values
# (verified via `grep -F '<value>'` per AC 2.5 verification rule); template-variable
# reads `{{ .Site.Data.consulting.<key> }}` reserved for future migration.
#
# Config Traceability - every key below has a documented reader (AC 2.5).
# Numeric *_gbp keys are present per AC 2.1 spec; some are programmatic-check-only
# (AC 2.5 carve-out: "OK if unread but document as such").
#
# Canonical detailed Pricing-Matrix + Billing reader (hoiboy-uk#40): content/consulting/pricing-billing/index.md
#
#  - business.legal_name                                              -> content/consulting/<slug>/index.md (legal footer)
#  - business.companies_house                                         -> content/consulting/<slug>/index.md (legal footer)
#  - business.vat_number                                              -> content/consulting/<slug>/index.md (legal footer; null until HMRC issuance)
#  - harness_architect.calcom_booking                                 -> layouts/_shortcodes/consulting-cta.html (CTA href)
#  - harness_architect.company_audit.day_rate_gbp                    -> AC 2.5 carve-out: optional programmatic check; currently unread
#  - harness_architect.company_audit.day_rate_display                -> content/consulting/<slug>/index.md + pricing-billing (audit bullet/row, literal "1,500 per day")
#  - harness_architect.company_audit.typical_days.tier_5_to_10       -> content/consulting/<slug>/index.md + pricing-billing (day-band guidance, "1 day")
#  - harness_architect.company_audit.typical_days.tier_10_to_50      -> content/consulting/<slug>/index.md + pricing-billing (day-band guidance, "2-3 days" / "2 to 3 days")
#  - harness_architect.company_audit.typical_days.tier_50_plus       -> content/consulting/<slug>/index.md + pricing-billing (50+ scoped and quoted at discovery; published band retired per OD-17)
#  - harness_architect.per_harness_audit.price_gbp_default           -> content/consulting/<slug>/index.md (per-harness audit bullet, literal £750)
#  - harness_architect.per_harness_audit.price_display_default       -> content/consulting/<slug>/index.md (per-harness audit bullet, literal "750")
#  - harness_architect.foundation_setup.base_price_gbp               -> content/consulting/<slug>/index.md (foundation bullet, literal £3,000)
#  - harness_architect.foundation_setup.base_days                    -> content/consulting/<slug>/index.md (foundation bullet, literal "2 days")
#  - harness_architect.foundation_setup.additional_day_rate_gbp      -> content/consulting/<slug>/index.md (foundation bullet, literal £1,500/extra)
#  - harness_architect.foundation_setup.max_days                     -> content/consulting/<slug>/index.md (foundation bullet, literal "4 days max")
#  - harness_architect.tier_1_first_month_support.included           -> content/consulting/<slug>/index.md (Tier 1 bullet) + consulting-ops/templates/sow-harness-architect.md §[Refund]
#  - harness_architect.tier_1_first_month_support.forfeit_on_refund  -> consulting-ops/templates/sow-harness-architect.md §[Refund] (Tier 1 forfeit clause)
#  - harness_architect.tier_1_first_month_support.hours_per_harness  -> content/consulting/<slug>/index.md (Tier 1 bullet, literal "8 hours") + consulting-ops/templates/sow-harness-architect.md §[Scope - Tier 1]
#  - harness_architect.tier_1_first_month_support.scope_text         -> content/consulting/<slug>/index.md (Tier 1 bullet)
#  - harness_architect.tier_2_hourly_pack.pack_price_gbp             -> content/consulting/<slug>/index.md (Tier 2 bullet, literal £1,500) + consulting-ops/templates/sow-harness-architect.md §[Scope - Tier 2]
#  - harness_architect.tier_2_hourly_pack.pack_hours                 -> content/consulting/<slug>/index.md (Tier 2 bullet, literal "10 hours") + consulting-ops/templates/sow-harness-architect.md §[Scope - Tier 2]
#  - harness_architect.tier_2_hourly_pack.rate_per_hour_gbp          -> consulting-ops/templates/sow-harness-architect.md §[Scope - Tier 2] hourly rate
#  - harness_architect.tier_2_hourly_pack.open_scope                 -> consulting-ops/templates/sow-harness-architect.md §[Scope - Tier 2] open-scope flag
#  - harness_architect.monthly_maintenance_package.per_harness_mtm_gbp     -> content/consulting/<slug>/index.md (Tier 3 bullet, literal £200/mo) + consulting-ops/templates/sow-harness-architect.md §[Scope - Monthly Maintenance Package]
#  - harness_architect.monthly_maintenance_package.per_harness_annual_gbp  -> content/consulting/<slug>/index.md (Tier 3 bullet, literal £170/mo annual) + consulting-ops/templates/sow-harness-architect.md §[Scope - Monthly Maintenance Package]
#  - harness_architect.monthly_maintenance_package.portfolio_cap_published -> content/consulting/<slug>/index.md (Tier 3 "6-harness cap" anchor) + consulting-ops/templates/sow-harness-architect.md §[Scope - Monthly Maintenance Package] cap clause
#  - harness_architect.monthly_maintenance_package.overage_rate_gbp        -> consulting-ops/templates/sow-harness-architect.md §[Scope] overage clause (AC 4.7, literal £150/h)
#  - harness_architect.monthly_maintenance_package.monthly_hours_cap       -> consulting-ops/templates/sow-harness-architect.md §[Scope] cap clause (AC 4.7, literal "2.5 hours per harness per month")
#  - harness_architect.monthly_maintenance_package.rollover                -> consulting-ops/templates/sow-harness-architect.md §[Scope] no-rollover clause (AC 4.7)
#  - harness_architect.monthly_maintenance_package.termination_notice_days -> consulting-ops/templates/sow-harness-architect.md §[Term] 14-day mutual termination clause (AC 4.8)
#  - harness_architect.monthly_maintenance_package.continuity_gap_days     -> consulting-ops/templates/sow-harness-architect.md §[Term] 30-day-after-12-months clause (AC 4.5)
#  - harness_architect.monthly_maintenance_package.continuity_gap_trigger_months -> consulting-ops/templates/sow-harness-architect.md §[Term] 30-day-after-12-months clause (AC 4.5)

business:
  legal_name: "HOIBOY AI LTD"
  companies_house: "17211412"
  vat_number: null      # null until HMRC voluntary-VAT issuance lands; HOIBOY AI LTD not yet at £90k threshold, no paid clients yet (consulting-ops#10 AC 2.7 deferred per same logic that closed the prior VAT AC).

# Business Automation Services offer (consulting-ops#19). Same discovery call as the harness
# offer (one Cal.com event triages both), so calcom_booking reuses the live URL.
# Read by: layouts/_shortcodes/consulting-cta.html (CTA href, via offer="automation_services")
#          -> content/consulting/automation-services/index.md.
automation_services:
  calcom_booking: "https://cal.eu/hoiboyuk/discovery"

harness_architect:
  # Live booking URL (replaced 2026-05-08 - Cal.com EU instance, event-type id 284432).
  # Pre-Worker (hoiboy-uk#28): bookings fire Cal.com's default emails; post-Worker:
  # Brevo Hoi-voice templates take over. See docs/cal-com-setup.md for full setup.
  calcom_booking: "https://cal.eu/hoiboyuk/discovery"

  # Company structure audit - day-rate basis.
  # OD-PRICE-LADDER LOCKED = LIFT (consulting-ops#2 Phase 7 AC 7.2, 2026-05-06);
  # company-audit line superseded by OD-17 (day-rate basis, 2026-07-02, hoiboy-uk#41):
  # fixed headcount tiers retired for £1,500/day + VAT with day-band guidance (old values in the OD registry).
  company_audit:
    day_rate_gbp: 1500
    day_rate_display: "1,500 per day"   # £1,500 per day + VAT
    typical_days:
      tier_5_to_10: "1 day"             # typically, 5-10 employees
      tier_10_to_50: "2-3 days"         # typically, 10-50 employees
      tier_50_plus: "scoped and quoted at the discovery call"   # no published band

  # Per-harness audit (sequential, scoped per harness post company audit).
  per_harness_audit:
    price_gbp_default: 750
    price_display_default: "750"      # £750 + VAT per harness audit (1 SME-day)

  # Foundation setup - flat 2-day base + overflow up to a hard cap.
  foundation_setup:
    base_price_gbp: 3000
    base_days: 2
    additional_day_rate_gbp: 1500
    max_days: 4

  # Tier 1 - first month of post-build support included free per harness.
  tier_1_first_month_support:
    included: true
    forfeit_on_refund: true
    hours_per_harness: 8
    scope_text: "First month of support included free per harness shipped, capped at 8 hours of operator time across that first calendar month per harness (not full-time availability)"

  # Tier 2 - open-scope hourly pack, portfolio-wide.
  tier_2_hourly_pack:
    pack_price_gbp: 1500
    pack_hours: 10
    rate_per_hour_gbp: 150
    open_scope: true

  # Tier 3 - Monthly Maintenance Package, per harness, deliverable-anchored.
  monthly_maintenance_package:
    per_harness_mtm_gbp: 200
    per_harness_annual_gbp: 170
    portfolio_cap_published: 6
    overage_rate_gbp: 150
    monthly_hours_cap: 2.5
    rollover: false
    termination_notice_days: 14
    continuity_gap_days: 30
    continuity_gap_trigger_months: 12
