# Site params. Read by layouts/. Every key here MUST be referenced
# in at least one layout file. Dead keys fail config-traceability check.

# Dark mode: auto via prefers-color-scheme. No JS toggle. Both modes audited
# WCAG AA. See docs/research/07_DESIGN_TOKENS.md for the full design token table.

description = "Personal blog of Hoi. Food, booze, adventure, dance, tech and AI."
author = "Hoi"
brandName = "Life of O'Hoi"

# Authoritative external profiles for Schema.org Person.sameAs. These
# let LinkedIn, Google, and Bing wire the author entity on posts to a
# canonical profile ID across the web, which is the E-E-A-T signal
# required for proper author attribution in rich results and link
# preview cards. Referenced in layouts/_partials/head.html JSON-LD.
authorSameAs = [
  "https://www.linkedin.com/in/hoiung/",
  "https://github.com/hoiung",
]

# Design tokens: see docs/research/07_DESIGN_TOKENS.md
# (created during Phase 0.9 with hex value, contrast ratios, rationale).
# Accent: warm terracotta. Single colour applied to links + active nav.
accentColor = "#c0533a"

# Per-section layout switch. Sections in textFirstSections render
# as plain title+date list (Tech & AI). All others get image-card layout.
textFirstSections = ["tech-ai", "entrepreneurship", "trading"]

# Footer
footerText = "Senh Hoi Ung. CC BY-SA."
