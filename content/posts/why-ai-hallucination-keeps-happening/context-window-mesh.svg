<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440" role="img" aria-label="Three chat windows showing word relationships: a few words is clear; lots of words becomes a tangle the engine cannot hold straight; the same words wrapped in your own harness stay grouped and compacted. The real ceiling is the LLM engine and its built-in harness, not the context window. The window is a cap set on purpose to stay inside that ceiling." font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0533a"/>
    </marker>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .trailstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .okstroke { stroke: #7aa869; }
      .node { fill: #1a1a1a; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
        .trailstroke { stroke: #6a6a6a; }
        .node { fill: #f0f0f0; }
      }
    </style>
  </defs>

  <!-- own background so text contrast holds on any host -->
  <rect x="0" y="0" width="900" height="440" class="bg"/>

  <!-- title + subtitle -->
  <text x="450" y="28" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">THE CONTEXT WINDOW IS A CAP, NOT THE CEILING</text>
  <text x="450" y="50" text-anchor="middle" class="muted" font-size="11.5">the engine can only relate so many words at once. the window is a limit, set on purpose, to keep you inside that.</text>

  <!-- ===================== PANEL A: A FEW WORDS ===================== -->
  <rect x="20" y="70" width="260" height="246" rx="10" class="card boxstroke" stroke-width="1.6"/>
  <text x="150" y="96" text-anchor="middle" class="label" font-size="14.5">A FEW WORDS</text>
  <text x="150" y="115" text-anchor="middle" class="ok" font-size="10.5" font-weight="700" letter-spacing="1.5">CLEAR</text>

  <!-- links (behind pills) -->
  <line x1="90" y1="165" x2="210" y2="168" class="trailstroke" stroke-width="1.3"/>
  <line x1="90" y1="165" x2="150" y2="232" class="trailstroke" stroke-width="1.3"/>
  <line x1="210" y1="168" x2="150" y2="232" class="trailstroke" stroke-width="1.3"/>
  <line x1="150" y1="232" x2="88" y2="300" class="trailstroke" stroke-width="1.3"/>
  <line x1="150" y1="232" x2="215" y2="298" class="trailstroke" stroke-width="1.3"/>

  <!-- word pills -->
  <rect x="65" y="153" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="90" y="169" text-anchor="middle" class="label" font-size="12.5">you</text>
  <rect x="185" y="156" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="210" y="172" text-anchor="middle" class="label" font-size="12.5">ask</text>
  <rect x="125" y="220" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="150" y="236" text-anchor="middle" class="label" font-size="12.5">bug</text>
  <rect x="60" y="288" width="56" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="88" y="304" text-anchor="middle" class="label" font-size="12.5">code</text>
  <rect x="190" y="286" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="215" y="302" text-anchor="middle" class="label" font-size="12.5">fix</text>

  <text x="150" y="307" text-anchor="middle" class="muted" font-size="11">every link is easy to follow</text>

  <!-- ===================== PANEL B: LOTS OF WORDS (overloaded) ===================== -->
  <rect x="320" y="70" width="260" height="246" rx="10" class="card accentstroke" stroke-width="2.6"/>
  <text x="450" y="96" text-anchor="middle" class="label" font-size="14.5">LOTS OF WORDS</text>
  <text x="450" y="115" text-anchor="middle" class="accent" font-size="10.5" font-weight="700" letter-spacing="1.5">AT THE LIMIT</text>

  <!-- tangle of links -->
  <g stroke-width="1">
    <line x1="360" y1="158" x2="428" y2="150" class="trailstroke"/>
    <line x1="428" y1="150" x2="498" y2="162" class="trailstroke"/>
    <line x1="498" y1="162" x2="548" y2="152" class="trailstroke"/>
    <line x1="360" y1="158" x2="418" y2="200" class="trailstroke"/>
    <line x1="428" y1="150" x2="418" y2="200" class="accentstroke"/>
    <line x1="428" y1="150" x2="482" y2="198" class="trailstroke"/>
    <line x1="498" y1="162" x2="482" y2="198" class="trailstroke"/>
    <line x1="548" y1="152" x2="545" y2="210" class="trailstroke"/>
    <line x1="350" y1="205" x2="418" y2="200" class="trailstroke"/>
    <line x1="418" y1="200" x2="482" y2="198" class="accentstroke"/>
    <line x1="482" y1="198" x2="545" y2="210" class="trailstroke"/>
    <line x1="350" y1="205" x2="366" y2="255" class="trailstroke"/>
    <line x1="418" y1="200" x2="432" y2="250" class="trailstroke"/>
    <line x1="418" y1="200" x2="366" y2="255" class="trailstroke"/>
    <line x1="482" y1="198" x2="500" y2="255" class="trailstroke"/>
    <line x1="545" y1="210" x2="548" y2="258" class="trailstroke"/>
    <line x1="366" y1="255" x2="432" y2="250" class="accentstroke"/>
    <line x1="432" y1="250" x2="500" y2="255" class="trailstroke"/>
    <line x1="500" y1="255" x2="548" y2="258" class="trailstroke"/>
    <line x1="366" y1="255" x2="392" y2="298" class="trailstroke"/>
    <line x1="432" y1="250" x2="392" y2="298" class="accentstroke"/>
    <line x1="432" y1="250" x2="468" y2="300" class="trailstroke"/>
    <line x1="500" y1="255" x2="468" y2="300" class="accentstroke"/>
    <line x1="500" y1="255" x2="538" y2="296" class="trailstroke"/>
    <line x1="548" y1="258" x2="538" y2="296" class="trailstroke"/>
    <line x1="392" y1="298" x2="468" y2="300" class="trailstroke"/>
    <line x1="468" y1="300" x2="538" y2="296" class="trailstroke"/>
    <line x1="428" y1="150" x2="432" y2="250" class="accentstroke"/>
    <line x1="498" y1="162" x2="500" y2="255" class="trailstroke"/>
    <line x1="418" y1="200" x2="392" y2="298" class="trailstroke"/>
    <line x1="482" y1="198" x2="468" y2="300" class="trailstroke"/>
  </g>

  <!-- word dots -->
  <g>
    <circle cx="360" cy="158" r="4" class="node"/>
    <circle cx="428" cy="150" r="4" class="node"/>
    <circle cx="498" cy="162" r="4" class="node"/>
    <circle cx="548" cy="152" r="4" class="node"/>
    <circle cx="350" cy="205" r="4" class="node"/>
    <circle cx="418" cy="200" r="4.5" class="accent"/>
    <circle cx="482" cy="198" r="4.5" class="accent"/>
    <circle cx="545" cy="210" r="4" class="node"/>
    <circle cx="366" cy="255" r="4" class="node"/>
    <circle cx="432" cy="250" r="4.5" class="accent"/>
    <circle cx="500" cy="255" r="4.5" class="accent"/>
    <circle cx="548" cy="258" r="4" class="node"/>
    <circle cx="392" cy="298" r="4" class="node"/>
    <circle cx="468" cy="300" r="4" class="node"/>
    <circle cx="538" cy="296" r="4" class="node"/>
  </g>

  <text x="450" y="307" text-anchor="middle" class="muted" font-size="11">more links than it can hold</text>

  <!-- ===================== PANEL C: SAME + YOUR HARNESS ===================== -->
  <rect x="620" y="70" width="260" height="246" rx="10" class="card boxstroke" stroke-width="1.6"/>
  <text x="750" y="96" text-anchor="middle" class="label" font-size="14">SAME + YOUR HARNESS</text>
  <text x="750" y="115" text-anchor="middle" class="ok" font-size="10.5" font-weight="700" letter-spacing="1.5">KEPT IN CHECK</text>

  <!-- harness frame -->
  <rect x="638" y="128" width="226" height="160" rx="8" fill="none" class="accentstroke" stroke-width="1.4" stroke-dasharray="5 4"/>
  <rect x="642" y="120" width="86" height="17" rx="8.5" class="card accentstroke" stroke-width="1.2"/>
  <text x="685" y="132" text-anchor="middle" class="accent" font-size="9.5" font-weight="700" letter-spacing="1">YOUR HARNESS</text>

  <!-- cluster groupings (dashed) -->
  <rect x="644" y="142" width="106" height="74" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="768" y="142" width="90" height="126" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="652" y="240" width="134" height="46" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- tidy links within clusters -->
  <g stroke-width="1.1">
    <line x1="660" y1="158" x2="728" y2="150" class="trailstroke"/>
    <line x1="660" y1="158" x2="650" y2="205" class="trailstroke"/>
    <line x1="728" y1="150" x2="718" y2="200" class="trailstroke"/>
    <line x1="650" y1="205" x2="718" y2="200" class="trailstroke"/>
    <line x1="798" y1="162" x2="848" y2="152" class="trailstroke"/>
    <line x1="798" y1="162" x2="782" y2="198" class="trailstroke"/>
    <line x1="848" y1="152" x2="845" y2="210" class="trailstroke"/>
    <line x1="782" y1="198" x2="800" y2="255" class="trailstroke"/>
    <line x1="845" y1="210" x2="848" y2="258" class="trailstroke"/>
    <line x1="800" y1="255" x2="848" y2="258" class="trailstroke"/>
    <line x1="666" y1="255" x2="732" y2="250" class="trailstroke"/>
    <line x1="666" y1="255" x2="692" y2="298" class="trailstroke"/>
    <line x1="732" y1="250" x2="768" y2="300" class="trailstroke"/>
    <line x1="692" y1="298" x2="768" y2="300" class="trailstroke"/>
    <line x1="718" y1="200" x2="732" y2="250" class="trailstroke"/>
    <line x1="800" y1="255" x2="838" y2="296" class="trailstroke"/>
  </g>

  <!-- word dots -->
  <g>
    <circle cx="660" cy="158" r="4" class="node"/>
    <circle cx="728" cy="150" r="4" class="node"/>
    <circle cx="798" cy="162" r="4" class="node"/>
    <circle cx="848" cy="152" r="4" class="node"/>
    <circle cx="650" cy="205" r="4" class="node"/>
    <circle cx="718" cy="200" r="4" class="node"/>
    <circle cx="782" cy="198" r="4" class="node"/>
    <circle cx="845" cy="210" r="4" class="node"/>
    <circle cx="666" cy="255" r="4" class="node"/>
    <circle cx="732" cy="250" r="4" class="node"/>
    <circle cx="800" cy="255" r="4" class="node"/>
    <circle cx="848" cy="258" r="4" class="node"/>
    <circle cx="692" cy="298" r="4" class="node"/>
    <circle cx="768" cy="300" r="4" class="node"/>
    <circle cx="838" cy="296" r="4" class="node"/>
  </g>

  <!-- green automation markers on each cluster -->
  <circle cx="646" cy="144" r="3.2" class="ok"/>
  <circle cx="770" cy="144" r="3.2" class="ok"/>
  <circle cx="654" cy="242" r="3.2" class="ok"/>

  <text x="750" y="307" text-anchor="middle" class="muted" font-size="11">grouped + compacted to fit</text>

  <!-- ===================== arrows down to the engine ===================== -->
  <line x1="150" y1="318" x2="150" y2="352" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="318" x2="450" y2="352" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="318" x2="750" y2="352" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- engine bar = the real ceiling -->
  <rect x="20" y="356" width="860" height="42" rx="10" class="card accentstroke" stroke-width="2"/>
  <text x="450" y="374" text-anchor="middle" class="label" font-size="13">THE LLM ENGINE + ITS OWN GENERAL HARNESS</text>
  <text x="450" y="390" text-anchor="middle" class="muted" font-size="11">the real ceiling: how many word-links it can hold at once (the part even I cannot see inside)</text>

  <!-- verdict -->
  <text x="450" y="424" text-anchor="middle" font-size="13.5">
    <tspan class="muted">The window was never the real ceiling.</tspan><tspan class="accent" font-weight="700" dx="10">The engine is. The window just caps you to stay inside it.</tspan>
  </text>
</svg>
