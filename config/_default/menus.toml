[[consulting]]
  # Two .cta-line spans force 2-line wrap on desktop sidebar via CSS
  # display:block at min-width:769px; on mobile they stay inline and the
  # literal space between them is the word separator. Span approach avoids
  # the <br>+whitespace minifier trap (tdewolff strips whitespace adjacent
  # to <br> in production builds). Single-quoted TOML literal string
  # avoids escaping the inner double quotes.
