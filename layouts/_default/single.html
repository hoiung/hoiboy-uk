{{- define "main" -}}
<article>
  <h1>{{ .Title }}</h1>
  {{- if not .Date.IsZero -}}
  <div class="post-meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
    {{- with .Params.categories -}}
      &middot;
      {{- range $i, $c := . -}}
        {{- if $i }}, {{ end -}}
        <a href="/{{ $c | urlize }}/">{{ $c }}</a>
      {{- end -}}
    {{- end -}}
  </div>
  {{- end -}}
  {{ .Content }}
</article>
{{- end -}}
