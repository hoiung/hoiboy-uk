<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 450" width="920" height="450" role="img" aria-label="When is it ripe: maturity ripples fast to slow, daily at the bottom up to monthly on top. Ripe means your timeframe is hot and the bigger timeframe is still cold, leaving room above, so the move is still climbing. All hot means too late. Slow hottest means the backside, rolling over." font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrowOK" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7aa869"/></marker>
    <marker id="arrowBad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/></marker>
    <marker id="arrowMute" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa0a6"/></marker>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .accent { fill: #c0533a; }
      .boxstroke { stroke: #9aa0a6; }
      .accentstroke { stroke: #c0533a; }
      .gA { fill: #22c55e; } .gB { fill: #14b8a6; } .gC { fill: #f59e0b; } .gD { fill: #f97316; } .gE { fill: #ef4444; }
      .ok { fill: #7aa869; } .bad { fill: #ef4444; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="450" class="bg"/>
  <text x="905" y="24.5" text-anchor="end" class="watermark" font-size="11.2" font-weight="400" letter-spacing="0.51">hoiboy.uk</text>

  <text x="460" y="34" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">WHEN IS IT RIPE? THE RIPPLE</text>
  <text x="460" y="58" text-anchor="middle" class="muted" font-size="12" letter-spacing="0.5">maturity ripples fast to slow: daily (bottom) up to monthly (top). slow timeframe sits on top.</text>

  <!-- ===================== PANEL 1: RIPE ===================== -->
  <rect x="22" y="80" width="276" height="318" rx="12" class="card accentstroke" stroke-width="2.4"/>
  <text x="160" y="110" text-anchor="middle" class="ok" font-size="13.5" font-weight="700" letter-spacing="1">EARLY &#183; RIPE</text>
  <text x="160" y="130" text-anchor="middle" class="muted" font-size="11">your tf hot, bigger tf still cold</text>
  <!-- M/W/D rows (slow on top, fast trigger on bottom) -->
  <text x="84" y="171" class="label" font-size="14">M</text>
  <rect x="104" y="150" width="86" height="34" rx="8" class="gE"/><text x="147" y="173" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">E</text>
  <text x="200" y="164" class="accent" font-size="10.5" font-weight="700">room</text>
  <text x="200" y="178" class="accent" font-size="10.5" font-weight="700">above</text>
  <text x="84" y="217" class="label" font-size="14">W</text>
  <rect x="104" y="196" width="86" height="34" rx="8" class="gA"/><text x="147" y="219" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">A</text>
  <text x="84" y="263" class="label" font-size="14">D</text>
  <rect x="104" y="242" width="86" height="34" rx="8" class="gA"/><text x="147" y="265" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">A</text>
  <!-- direction arrow: up-right (climbing = ripe) -->
  <line x1="120" y1="332" x2="200" y2="298" class="ok" stroke-width="3" marker-end="url(#arrowOK)" style="stroke:#7aa869"/>
  <text x="160" y="368" text-anchor="middle" class="ok" font-size="13" font-weight="700">ENTER</text>
  <text x="160" y="386" text-anchor="middle" class="muted" font-size="11">climbing &#183; A&#183;A&#183;E</text>

  <!-- ===================== PANEL 2: LATE ===================== -->
  <rect x="322" y="80" width="276" height="318" rx="12" class="card boxstroke" stroke-width="1.8"/>
  <text x="460" y="110" text-anchor="middle" class="muted" font-size="13.5" font-weight="700" letter-spacing="1">TOO LATE</text>
  <text x="460" y="130" text-anchor="middle" class="muted" font-size="11">everything already hot = no room</text>
  <text x="384" y="171" class="label" font-size="14">M</text>
  <rect x="404" y="150" width="86" height="34" rx="8" class="gA"/><text x="447" y="173" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">A</text>
  <text x="384" y="217" class="label" font-size="14">W</text>
  <rect x="404" y="196" width="86" height="34" rx="8" class="gA"/><text x="447" y="219" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">A</text>
  <text x="384" y="263" class="label" font-size="14">D</text>
  <rect x="404" y="242" width="86" height="34" rx="8" class="gA"/><text x="447" y="265" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">A</text>
  <!-- direction arrow: flat -->
  <line x1="420" y1="315" x2="500" y2="315" class="boxstroke" stroke-width="3" marker-end="url(#arrowMute)" style="stroke:#9aa0a6"/>
  <text x="460" y="368" text-anchor="middle" class="muted" font-size="13" font-weight="700">EXTENDED</text>
  <text x="460" y="386" text-anchor="middle" class="muted" font-size="11">topped &#183; A&#183;A&#183;A</text>

  <!-- ===================== PANEL 3: BACKSIDE ===================== -->
  <rect x="622" y="80" width="276" height="318" rx="12" class="card boxstroke" stroke-width="1.8"/>
  <text x="760" y="110" text-anchor="middle" class="bad" font-size="13.5" font-weight="700" letter-spacing="1">THE BACKSIDE</text>
  <text x="760" y="130" text-anchor="middle" class="muted" font-size="11">slow tf hottest = the move already ran</text>
  <text x="684" y="171" class="label" font-size="14">M</text>
  <rect x="704" y="150" width="86" height="34" rx="8" class="gA"/><text x="747" y="173" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">A</text>
  <text x="684" y="217" class="label" font-size="14">W</text>
  <rect x="704" y="196" width="86" height="34" rx="8" class="gC"/><text x="747" y="219" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">C</text>
  <text x="684" y="263" class="label" font-size="14">D</text>
  <rect x="704" y="242" width="86" height="34" rx="8" class="gE"/><text x="747" y="265" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">E</text>
  <!-- direction arrow: down-right (rolling over = backside) -->
  <line x1="720" y1="298" x2="800" y2="332" class="bad" stroke-width="3" marker-end="url(#arrowBad)" style="stroke:#ef4444"/>
  <text x="760" y="368" text-anchor="middle" class="bad" font-size="13" font-weight="700">AVOID</text>
  <text x="760" y="386" text-anchor="middle" class="muted" font-size="11">rolling over &#183; E&#183;C&#183;A</text>

  <!-- takeaway -->
  <text x="460" y="432" text-anchor="middle" font-size="13.5">
    <tspan class="muted">ripe = be early in the ripple:</tspan><tspan class="accent" font-weight="700" dx="6">your timeframe hot, the bigger one still cold.</tspan>
  </text>
</svg>
