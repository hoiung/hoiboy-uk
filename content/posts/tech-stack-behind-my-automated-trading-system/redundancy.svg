<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" role="img" aria-label="The redundancy and failover setup" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0533a"/>
    </marker>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .trailstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
        .trailstroke { stroke: #6a6a6a; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="420" class="bg"/>
  <text x="885" y="24" text-anchor="end" class="watermark" font-size="11" font-weight="400" letter-spacing="0.5">hoiboy.uk</text>

  <text x="450" y="30" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">STAYING UP WHEN THINGS BREAK</text>
  <text x="450" y="52" text-anchor="middle" class="muted" font-size="11.5">a pair of managers watch a pair of data services and fail over on their own.</text>

  <!-- managers -->
  <rect class="card boxstroke" x="110" y="84" width="210" height="74" rx="10" stroke-width="1.8"/>
  <text class="label" x="215" y="116" text-anchor="middle" font-size="14">Redundancy Manager 1</text>
  <text class="muted" x="215" y="138" text-anchor="middle" font-size="11.5">leader · decides who's live</text>

  <rect class="card boxstroke" x="580" y="84" width="210" height="74" rx="10" stroke-width="1.8"/>
  <text class="label" x="685" y="116" text-anchor="middle" font-size="14">Redundancy Manager 2</text>
  <text class="muted" x="685" y="138" text-anchor="middle" font-size="11.5">backup</text>

  <line x1="320" y1="106" x2="580" y2="106" class="trailstroke" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text class="muted" x="450" y="100" text-anchor="middle" font-size="11">heartbeat</text>

  <!-- managers fail over between themselves too: bidirectional, automatic -->
  <line x1="578" y1="138" x2="322" y2="138" class="accentstroke" stroke-width="2.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="muted" x="450" y="132" text-anchor="middle" font-size="11">auto failover, no human needed</text>

  <!-- data services -->
  <rect class="card accentstroke" x="110" y="236" width="210" height="86" rx="10" stroke-width="2.5"/>
  <text class="label" x="215" y="266" text-anchor="middle" font-size="14">Data Service 1</text>
  <text class="accent" x="215" y="288" text-anchor="middle" font-size="11.5" font-weight="700" letter-spacing="1.5">ACTIVE</text>
  <text class="muted" x="215" y="307" text-anchor="middle" font-size="11.5">serving live prices</text>

  <rect class="card boxstroke" x="580" y="236" width="210" height="86" rx="10" stroke-width="1.8"/>
  <text class="label" x="685" y="266" text-anchor="middle" font-size="14">Data Service 2</text>
  <text class="muted" x="685" y="288" text-anchor="middle" font-size="11.5" font-weight="700" letter-spacing="1.5">WARM STANDBY</text>
  <text class="muted" x="685" y="307" text-anchor="middle" font-size="11.5">ready to take over</text>

  <!-- watch links: each manager watches both services -->
  <line x1="215" y1="158" x2="215" y2="234" class="trailstroke" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text class="muted" x="225" y="200" font-size="10">watches</text>
  <line x1="685" y1="158" x2="685" y2="234" class="trailstroke" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text class="muted" x="695" y="200" font-size="10">watches</text>
  <line x1="300" y1="158" x2="600" y2="234" class="trailstroke" stroke-width="1.3" stroke-dasharray="5 4"/>
  <line x1="600" y1="158" x2="300" y2="234" class="trailstroke" stroke-width="1.3" stroke-dasharray="5 4"/>

  <!-- failover -->
  <line x1="578" y1="279" x2="324" y2="279" class="accentstroke" stroke-width="2.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="muted" x="450" y="272" text-anchor="middle" font-size="11">auto failover, no human needed</text>

  <text x="450" y="384" text-anchor="middle" font-size="14"><tspan class="muted">Exactly one data service is live at a time. </tspan><tspan class="accent" font-weight="700" dx="6">the managers handle the swap, I don't.</tspan></text>
</svg>
