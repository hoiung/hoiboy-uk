<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 534" width="900" height="534" role="img" aria-label="Three chat windows showing word relationships: a few words is clear; lots of words becomes a tangle the engine cannot hold straight; the same words wrapped in your own harness stay grouped and compacted. The real ceiling is the LLM engine and its built-in general harness, not the context window. The window is a cap set on purpose to stay inside that ceiling." font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0533a"/>
    </marker>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .trailstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .node { fill: #1a1a1a; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
        .trailstroke { stroke: #6a6a6a; }
        .node { fill: #f0f0f0; }
      }
    </style>
  </defs>

  <!-- own background so text contrast holds on any host -->
  <rect x="0" y="0" width="900" height="534" class="bg"/>

  <!-- title + subtitle -->
  <text x="450" y="28" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">THE CONTEXT WINDOW IS A CAP, NOT THE CEILING</text>
  <text x="450" y="50" text-anchor="middle" class="muted" font-size="11.5">the engine can only relate so many words at once. the window is a limit, set on purpose, to keep you inside that.</text>

  <!-- ===================== PANEL A: A FEW WORDS ===================== -->
  <rect x="20" y="70" width="260" height="340" rx="10" class="card boxstroke" stroke-width="1.6"/>
  <text x="150" y="98" text-anchor="middle" class="label" font-size="14.5">A FEW WORDS</text>
  <text x="150" y="120" text-anchor="middle" class="ok" font-size="10.5" font-weight="700" letter-spacing="1.5">CLEAR</text>

  <!-- links (behind pills) -->
  <line x1="90" y1="205" x2="210" y2="208" class="trailstroke" stroke-width="1.3"/>
  <line x1="90" y1="205" x2="150" y2="276" class="trailstroke" stroke-width="1.3"/>
  <line x1="210" y1="208" x2="150" y2="276" class="trailstroke" stroke-width="1.3"/>
  <line x1="150" y1="276" x2="88" y2="348" class="trailstroke" stroke-width="1.3"/>
  <line x1="150" y1="276" x2="215" y2="346" class="trailstroke" stroke-width="1.3"/>

  <!-- word pills -->
  <rect x="65" y="193" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="90" y="209" text-anchor="middle" class="label" font-size="12.5">you</text>
  <rect x="185" y="196" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="210" y="212" text-anchor="middle" class="label" font-size="12.5">ask</text>
  <rect x="125" y="264" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="150" y="280" text-anchor="middle" class="label" font-size="12.5">bug</text>
  <rect x="60" y="336" width="56" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="88" y="352" text-anchor="middle" class="label" font-size="12.5">code</text>
  <rect x="190" y="334" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="215" y="350" text-anchor="middle" class="label" font-size="12.5">fix</text>

  <text x="150" y="392" text-anchor="middle" class="muted" font-size="11">every link is easy to follow</text>

  <!-- ===================== PANEL B: LOTS OF WORDS (overloaded) ===================== -->
  <rect x="320" y="70" width="260" height="340" rx="10" class="card accentstroke" stroke-width="2.6"/>
  <text x="450" y="98" text-anchor="middle" class="label" font-size="14.5">LOTS OF WORDS</text>
  <text x="450" y="120" text-anchor="middle" class="accent" font-size="10.5" font-weight="700" letter-spacing="1.5">AT THE LIMIT</text>

  <!-- tangle of links -->
  <g stroke-width="1">
    <line x1="360" y1="200" x2="428" y2="192" class="trailstroke"/>
    <line x1="428" y1="192" x2="498" y2="204" class="trailstroke"/>
    <line x1="498" y1="204" x2="548" y2="194" class="trailstroke"/>
    <line x1="360" y1="200" x2="418" y2="244" class="trailstroke"/>
    <line x1="428" y1="192" x2="418" y2="244" class="accentstroke"/>
    <line x1="428" y1="192" x2="482" y2="242" class="trailstroke"/>
    <line x1="498" y1="204" x2="482" y2="242" class="trailstroke"/>
    <line x1="548" y1="194" x2="545" y2="254" class="trailstroke"/>
    <line x1="350" y1="248" x2="418" y2="244" class="trailstroke"/>
    <line x1="418" y1="244" x2="482" y2="242" class="accentstroke"/>
    <line x1="482" y1="242" x2="545" y2="254" class="trailstroke"/>
    <line x1="350" y1="248" x2="366" y2="298" class="trailstroke"/>
    <line x1="418" y1="244" x2="432" y2="294" class="trailstroke"/>
    <line x1="418" y1="244" x2="366" y2="298" class="trailstroke"/>
    <line x1="482" y1="242" x2="500" y2="298" class="trailstroke"/>
    <line x1="545" y1="254" x2="548" y2="302" class="trailstroke"/>
    <line x1="366" y1="298" x2="432" y2="294" class="accentstroke"/>
    <line x1="432" y1="294" x2="500" y2="298" class="trailstroke"/>
    <line x1="500" y1="298" x2="548" y2="302" class="trailstroke"/>
    <line x1="366" y1="298" x2="392" y2="346" class="trailstroke"/>
    <line x1="432" y1="294" x2="392" y2="346" class="accentstroke"/>
    <line x1="432" y1="294" x2="468" y2="348" class="trailstroke"/>
    <line x1="500" y1="298" x2="468" y2="348" class="accentstroke"/>
    <line x1="500" y1="298" x2="538" y2="344" class="trailstroke"/>
    <line x1="548" y1="302" x2="538" y2="344" class="trailstroke"/>
    <line x1="392" y1="346" x2="468" y2="348" class="trailstroke"/>
    <line x1="468" y1="348" x2="538" y2="344" class="trailstroke"/>
    <line x1="428" y1="192" x2="432" y2="294" class="accentstroke"/>
    <line x1="498" y1="204" x2="500" y2="298" class="trailstroke"/>
    <line x1="418" y1="244" x2="392" y2="346" class="trailstroke"/>
    <line x1="482" y1="242" x2="468" y2="348" class="trailstroke"/>
  </g>

  <!-- word dots -->
  <g>
    <circle cx="360" cy="200" r="4" class="node"/>
    <circle cx="428" cy="192" r="4" class="node"/>
    <circle cx="498" cy="204" r="4" class="node"/>
    <circle cx="548" cy="194" r="4" class="node"/>
    <circle cx="350" cy="248" r="4" class="node"/>
    <circle cx="418" cy="244" r="4.5" class="accent"/>
    <circle cx="482" cy="242" r="4.5" class="accent"/>
    <circle cx="545" cy="254" r="4" class="node"/>
    <circle cx="366" cy="298" r="4" class="node"/>
    <circle cx="432" cy="294" r="4.5" class="accent"/>
    <circle cx="500" cy="298" r="4.5" class="accent"/>
    <circle cx="548" cy="302" r="4" class="node"/>
    <circle cx="392" cy="346" r="4" class="node"/>
    <circle cx="468" cy="348" r="4" class="node"/>
    <circle cx="538" cy="344" r="4" class="node"/>
  </g>

  <text x="450" y="392" text-anchor="middle" class="muted" font-size="11">more links than it can hold</text>

  <!-- ===================== PANEL C: SAME + YOUR HARNESS ===================== -->
  <rect x="620" y="70" width="260" height="340" rx="10" class="card boxstroke" stroke-width="1.6"/>
  <text x="750" y="98" text-anchor="middle" class="label" font-size="14">SAME + YOUR HARNESS</text>
  <text x="750" y="120" text-anchor="middle" class="ok" font-size="10.5" font-weight="700" letter-spacing="1.5">KEPT IN CHECK</text>

  <!-- harness tag + frame (well clear of the status line) -->
  <rect x="688" y="136" width="88" height="18" rx="9" class="card accentstroke" stroke-width="1.2"/>
  <text x="732" y="148.5" text-anchor="middle" class="accent" font-size="9.5" font-weight="700" letter-spacing="1">YOUR HARNESS</text>
  <rect x="636" y="172" width="232" height="200" rx="8" fill="none" class="accentstroke" stroke-width="1.4" stroke-dasharray="5 4"/>

  <!-- cluster groupings (dashed) -->
  <rect x="642" y="180" width="98" height="82" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="768" y="180" width="96" height="182" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="650" y="282" width="116" height="82" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- tidy links within clusters -->
  <g stroke-width="1.1">
    <line x1="660" y1="200" x2="728" y2="192" class="trailstroke"/>
    <line x1="660" y1="200" x2="650" y2="248" class="trailstroke"/>
    <line x1="728" y1="192" x2="718" y2="244" class="trailstroke"/>
    <line x1="650" y1="248" x2="718" y2="244" class="trailstroke"/>
    <line x1="798" y1="204" x2="848" y2="194" class="trailstroke"/>
    <line x1="798" y1="204" x2="782" y2="242" class="trailstroke"/>
    <line x1="848" y1="194" x2="845" y2="254" class="trailstroke"/>
    <line x1="782" y1="242" x2="800" y2="298" class="trailstroke"/>
    <line x1="845" y1="254" x2="848" y2="302" class="trailstroke"/>
    <line x1="800" y1="298" x2="848" y2="302" class="trailstroke"/>
    <line x1="848" y1="302" x2="838" y2="344" class="trailstroke"/>
    <line x1="666" y1="298" x2="732" y2="294" class="trailstroke"/>
    <line x1="666" y1="298" x2="692" y2="346" class="trailstroke"/>
    <line x1="732" y1="294" x2="754" y2="348" class="trailstroke"/>
    <line x1="692" y1="346" x2="754" y2="348" class="trailstroke"/>
    <line x1="718" y1="244" x2="732" y2="294" class="trailstroke"/>
    <line x1="718" y1="244" x2="782" y2="242" class="trailstroke"/>
  </g>

  <!-- word dots -->
  <g>
    <circle cx="660" cy="200" r="4" class="node"/>
    <circle cx="728" cy="192" r="4" class="node"/>
    <circle cx="798" cy="204" r="4" class="node"/>
    <circle cx="848" cy="194" r="4" class="node"/>
    <circle cx="650" cy="248" r="4" class="node"/>
    <circle cx="718" cy="244" r="4" class="node"/>
    <circle cx="782" cy="242" r="4" class="node"/>
    <circle cx="845" cy="254" r="4" class="node"/>
    <circle cx="666" cy="298" r="4" class="node"/>
    <circle cx="732" cy="294" r="4" class="node"/>
    <circle cx="800" cy="298" r="4" class="node"/>
    <circle cx="848" cy="302" r="4" class="node"/>
    <circle cx="692" cy="346" r="4" class="node"/>
    <circle cx="754" cy="348" r="4" class="node"/>
    <circle cx="838" cy="344" r="4" class="node"/>
  </g>

  <!-- green automation markers, one per cluster -->
  <circle cx="646" cy="184" r="3.2" class="ok"/>
  <circle cx="772" cy="184" r="3.2" class="ok"/>
  <circle cx="654" cy="286" r="3.2" class="ok"/>

  <text x="750" y="392" text-anchor="middle" class="muted" font-size="11">grouped + compacted to fit</text>

  <!-- ===================== arrows down to the engine ===================== -->
  <line x1="150" y1="412" x2="150" y2="446" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="412" x2="450" y2="446" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="412" x2="750" y2="446" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- engine bar = the real ceiling -->
  <rect x="20" y="450" width="860" height="44" rx="10" class="card accentstroke" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" class="label" font-size="13">THE LLM ENGINE + ITS OWN GENERAL HARNESS</text>
  <text x="450" y="487" text-anchor="middle" class="muted" font-size="11">the real ceiling: how many word-links it can hold at once (the part even I cannot see inside)</text>

  <!-- verdict -->
  <text x="450" y="518" text-anchor="middle" font-size="13.5">
    <tspan class="muted">The window was never the real ceiling.</tspan><tspan class="accent" font-weight="700" dx="10">The engine is. The window just caps you to stay inside it.</tspan>
  </text>
</svg>
