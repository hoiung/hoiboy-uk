name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    outputs:
      passed:
        description: "CI passed"
        value: ${{ jobs.build.outputs.passed }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.done.outputs.passed }}
    env:
      HUGO_ENV: production
      GOMEMLIMIT: 2GiB
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Read pinned Hugo version
        id: hugo_version
        run: |
          if [ ! -f .hugo-version ]; then
            echo "::error::.hugo-version missing"
            exit 1
          fi
          V=$(cat .hugo-version | tr -d '[:space:]')
          if [ -z "$V" ]; then
            echo "::error::.hugo-version is empty"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Setup Hugo (pinned)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ steps.hugo_version.outputs.version }}
          extended: true

      - name: Assert Hugo version matches .hugo-version
        run: |
          INSTALLED=$(hugo version | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//')
          PINNED=${{ steps.hugo_version.outputs.version }}
          if [ "$INSTALLED" != "$PINNED" ]; then
            echo "::error::Hugo version drift: installed=$INSTALLED pinned=$PINNED"
            exit 1
          fi

      - name: Hugo cache
        uses: actions/cache@v4
        with:
          path: |
            resources/_gen
            /tmp/hugo_cache
          key: hugo-${{ runner.os }}-${{ hashFiles('.hugo-version', 'content/**', 'assets/**', 'layouts/**', 'config/**') }}
          restore-keys: |
            hugo-${{ runner.os }}-

      - name: Em-dash voice guard (zero tolerance)
        # content/posts/ excluded: voice-sacred legacy import (pre-AI corpus, issue #2)
        run: |
          set -e
          MATCHES=$(grep -rln --exclude-dir=posts $'\u2014' content layouts assets config docs scripts README.md 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Em dashes found in tracked files (voice rule):"
            echo "$MATCHES"
            grep -rn --exclude-dir=posts $'\u2014' content layouts assets config docs scripts README.md 2>/dev/null || true
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install --quiet pytest

      - name: Frontmatter validator
        run: python3 scripts/validate_frontmatter.py

      - name: Config traceability check
        run: python3 scripts/check_config_traceability.py

      - name: Hugo build (production)
        run: |
          hugo --gc --minify -e production 2>&1 | tee /tmp/hugo-build.log
          # Bidirectional warning allowlist check
          ACTUAL=$(grep -iE 'warn|error' /tmp/hugo-build.log | sort -u || true)
          ALLOWED=$(grep -v '^#' .hugo-warning-allowlist | grep -v '^$' | sort -u || true)
          NEW=$(comm -23 <(echo "$ACTUAL") <(echo "$ALLOWED"))
          DEAD=$(comm -13 <(echo "$ACTUAL") <(echo "$ALLOWED"))
          if [ -n "$NEW" ]; then
            echo "::error::New Hugo warnings outside allowlist:"
            echo "$NEW"
            exit 1
          fi
          if [ -n "$DEAD" ]; then
            echo "::error::Dead allowlist entries (no longer in build):"
            echo "$DEAD"
            exit 1
          fi

      - name: URL contract assertion
        run: |
          set -e
          for p in food adventure dance tech relationship about tags posts; do
            test -f "public/$p/index.html" || { echo "::error::missing /$p/index.html"; exit 1; }
          done
          test -f "public/index.html" || { echo "::error::missing root index.html"; exit 1; }
          test -f "public/index.xml" || { echo "::error::missing root RSS feed"; exit 1; }
          test -f "public/sitemap.xml" || { echo "::error::missing sitemap.xml"; exit 1; }
          test -f "public/robots.txt" || { echo "::error::missing robots.txt"; exit 1; }
          test -f "public/posts/foundation/index.html" || { echo "::error::missing foundation post"; exit 1; }
          test -f "public/tags/foundation/index.html" || { echo "::error::missing foundation tag page"; exit 1; }
          echo "URL contract OK"

      - name: RSS validates locally + jq schema asserts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils jq
          xmllint --noout public/index.xml
          xmllint --noout public/sitemap.xml

      - name: Frontmatter parser unit tests
        run: python3 -m pytest scripts/test_validate_frontmatter.py -q

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.json
          globs: |
            content/**/*.md
            docs/**/*.md
            README.md

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml './**/*.md'
          fail: true

      - name: Cache hygiene
        if: always()
        run: |
          if [ -d resources/_gen ]; then
            find resources/_gen -atime +30 -delete 2>/dev/null || true
          fi

      - name: Upload public artifact
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public
          retention-days: 7

      - id: done
        run: echo "passed=true" >> "$GITHUB_OUTPUT"
