# Minimum useful set for a markdown-first Hugo blog.
# Source rationale: docs/research/03_PRECOMMIT_DECISIONS.md
exclude: '^themes/'
default_language_version:
  python: python3
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--fix, --config, .markdownlint.json]
        files: ^(content|docs)/.*\.md$

  - repo: local
    hooks:
      # Validates the frontmatter contract on BOTH trees: posts require
      # title/date/categories/tags/description, project pages require
      # title/description. `description` is REQUIRED since blog-priv#55
      # Phase 2 - without it a page inherits the site-default meta
      # description and becomes a near-duplicate answer engines cannot
      # tell apart. The files: regex must cover content/consulting/ too,
      # or the gate never fires on a new project page.
      - id: frontmatter-validator
        name: Validate post and project-page frontmatter (incl. description)
        entry: python3 scripts/validate_frontmatter.py
        language: system
        pass_filenames: false
        # Extensions must stay in step with CONTENT_EXTS in
        # scripts/validate_frontmatter.py. A narrower pattern here means the hook
        # never fires for a page shape the validator would have rejected, so the
        # commit passes while the gate is claimed to cover it.
        files: ^content/(posts|consulting)/.*\.(md|markdown|html)$
      - id: config-traceability
        name: Config traceability check
        entry: python3 scripts/check_config_traceability.py
        language: system
        pass_filenames: false
        files: ^(config/_default/params\.toml|layouts/.*\.html|assets/.*\.css)$
      - id: check-voice-tells
        name: Voice guard (marker-driven)
        entry: python3 scripts/check-ai-writing-tells.py --mode blog --check-only-new
        language: system
        pass_filenames: true
        files: ^(content/.*\.md|docs/research/.*\.md)$
      - id: check-iamhoi-wrapping
        name: Enforce iamhoi marker wrapping on new posts
        entry: python3 scripts/check-iamhoi-wrapping.py --check-only-new
        language: system
        pass_filenames: true
        files: ^content/posts/.*\.md$
      - id: check-emdash-zero-tolerance
        name: Em-dash zero-tolerance guard (CI parity; blocks docs/ em dashes locally)
        # CI parity for the ci.yml "Em-dash voice guard (zero tolerance)" step via the
        # SAME script. Closes the gap where an em dash in unmarked docs prose (e.g.
        # docs/research/11_VOICE_PROFILE.md) passed the marker-driven voice guard,
        # failed CI only after the push, and silently froze Deploy (blog-priv#38).
        # Whole-tree (pass_filenames: false + always_run) to mirror CI exactly.
        entry: bash scripts/check_emdash_zero_tolerance.sh
        language: system
        pass_filenames: false
        always_run: true
      - id: check-emdash-newposts
        name: Em-dash guard for new posts (CI parity; date-gated, scans content/posts)
        # CI parity for the ci.yml "Em-dash guard (new posts, date-gated)" step via the
        # SAME script. The zero-tolerance grep above excludes content/posts (legacy
        # voice-sacred posts legitimately use em dashes), so NEW posts (date >= the
        # 2026-04-07 cutoff) are guarded here instead, exempting <!-- iamhoi-skip -->
        # blocks. Runs argless like CI (scans all new posts). blog-priv#38 parity sweep.
        entry: python3 scripts/check_emdash_newposts.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-wordcount
        name: Word-count ceiling (>3000 fails, skip legacy)
        entry: python3 scripts/check_wordcount.py
        language: system
        pass_filenames: true
        files: ^content/posts/.*/index\.md$
        always_run: false
      - id: check-exif
        name: Detect identifying EXIF in images (read-only)
        entry: python3 scripts/check-exif.py
        language: system
        pass_filenames: true
        files: '\.(jpg|jpeg|png|webp|JPG|JPEG|PNG|WEBP)$'
      # The bespoke voice_rules drift hook was removed (#33 AC 4.4): voice_rules.py
      # is a manifest-tracked vendored mirror, so the sst3-mirror-drift hooks below
      # already enforce its drift against canonical. Two hooks guarding the same file
      # was redundant.

      - id: check-public-repo-secrets
        name: Check for secrets in public repo
        entry: python3 scripts/check-public-repo-secrets.py . --staged-only
        language: system
        pass_filenames: false
        always_run: true

      - id: validate-internal-links
        name: Validate internal markdown links
        entry: python3 scripts/validate_internal_links.py
        language: system
        pass_filenames: false
        files: ^content/.*\.md$

      - id: check-social-cards
        name: Social-card guard (every singular page owns its og:image card)
        # Fails if a singular content page is a flat .md (cannot hold a card) or
        # a leaf bundle has no share-card / raster hero (falls back to the site
        # default card). Whole-tree scan; fires on any content or _headers change.
        entry: python3 scripts/check_social_cards.py
        language: system
        pass_filenames: false
        files: ^(content/.*|static/_headers)$

      - id: consulting-yaml-no-operator-todo
        name: Block OPERATOR_TODO placeholders in data/consulting.yaml
        # consulting-ops#2 AC 0.3 — defence-in-depth alongside the Hugo
        # shortcode mailto fallback + pre-publish.sh global gate. Catches
        # accidental commit of an unreplaced placeholder before push, so the
        # broken URL never reaches Cloudflare Pages.
        entry: bash
        args:
          - -c
          - 'if [ -f data/consulting.yaml ] && grep -F OPERATOR_TODO data/consulting.yaml; then echo "ERROR: data/consulting.yaml contains OPERATOR_TODO placeholder; replace before commit" >&2; exit 1; fi'
        language: system
        pass_filenames: false
        files: ^data/consulting\.yaml$

      - id: sst3-closure-loop-applied
        name: Stage 1 closure-loop applied_in propagation gate (#460 Phase 6 W1; consumer-repo propagation)
        # Fires on commits with Phase: 4 or Phase: 5 trailer. Invokes the
        # dotfiles canonical script via relative path (consumer is sibling of
        # dotfiles under ~/DevProjects/). Skip-cleanly if dotfiles unavailable.
        # Bypass: SKIP=sst3-closure-loop-applied git commit ...
        entry: bash
        args:
          - -c
          - |
            msg_file="$1"
            phase=$(grep -E "^Phase:[[:space:]]*[0-9]+" "$msg_file" | head -1 | grep -oE "[0-9]+" | head -1 || true)
            test -n "$phase" || exit 0
            test "$phase" = "4" -o "$phase" = "5" || exit 0
            branch=$(git rev-parse --abbrev-ref HEAD)
            issue=$(echo "$branch" | grep -oE "issue-[0-9]+" | grep -oE "[0-9]+" | head -1 || true)
            test -n "$issue" || exit 0
            CANONICAL=../dotfiles/SST3/scripts/check-closure-loop-applied.py
            [ -f "$CANONICAL" ] || { echo "SKIP: dotfiles canonical not found at $CANONICAL" >&2; exit 0; }
            python3 "$CANONICAL" --repo hoiboy-uk "$issue"
          - --
        language: system
        stages: [commit-msg]
        always_run: true
        verbose: true

      # >>> SST3 MANAGED BLOCK — DO NOT EDIT — propagated by propagate-block.py >>>
      - id: sst3-mirror-drift
        name: SST3 vendored file drift check (manifest-driven, staged-aware)
        entry: python3 scripts/check-mirror-drift.py --repo hoiboy-uk
        language: system
        pass_filenames: false
        always_run: true

      - id: sst3-mirror-drift-strict
        name: SST3 vendored file drift check (strict, push-time repo-wide)
        entry: python3 scripts/check-mirror-drift.py --repo hoiboy-uk --strict
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: sst3-managed-block-drift
        name: SST3 managed-block drift check (boundary-marker integrity, staged-aware)
        entry: python3 scripts/check-mirror-drift.py --repo hoiboy-uk --managed-blocks
        language: system
        pass_filenames: false
        always_run: true

      - id: sst3-managed-block-drift-strict
        name: SST3 managed-block drift check (strict, push-time)
        entry: python3 scripts/check-mirror-drift.py --repo hoiboy-uk --managed-blocks --strict
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # <<< END SST3 MANAGED BLOCK — propagated by propagate-block.py <<<
