<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" role="img" aria-label="Text on the left is chopped into token chunks that flow into a tall context window on the right. The window shades smoothly bottom to top from a green healthy zone, through an accuracy-drifts zone where drift happens more often the more it fills, to a terracotta overfilled hallucination-risk zone, with a marker around the middle showing where Hoi tries to compact, well before full. Up to one million tokens. Full is not better." font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .okstroke { stroke: #7aa869; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
      }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" class="accent"/></marker>
    <!-- vertical gradient: green healthy (bottom) -> drift -> terracotta hallucination (top); no hard bands, drift is continuous -->
    <linearGradient id="zoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c0533a"/>
      <stop offset="0.30" stop-color="#c0533a"/>
      <stop offset="0.62" stop-color="#7aa869"/>
      <stop offset="1" stop-color="#7aa869"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="480" class="bg"/>
  <text x="885" y="24" text-anchor="end" class="watermark" font-size="11" font-weight="400" letter-spacing="0.5">hoiboy.uk</text>

  <text x="450" y="34" text-anchor="middle" class="accent" font-size="14" font-weight="700" letter-spacing="2.5">TOKENS &amp; THE CONTEXT WINDOW</text>
  <text x="450" y="56" text-anchor="middle" class="muted" font-size="12" letter-spacing="0.5">the AI's working memory for one chat, measured in tokens</text>

  <!-- LEFT: text becomes tokens -->
  <text x="210" y="162" text-anchor="middle" class="muted" font-size="11" font-weight="600" letter-spacing="1.5">YOUR TEXT, IN CHUNKS</text>
  <g font-size="13">
    <rect x="95" y="182" width="64" height="32" rx="6" class="card"/><rect x="95" y="182" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="127" y="203" text-anchor="middle" class="label">The</text>
    <rect x="167" y="182" width="64" height="32" rx="6" class="card"/><rect x="167" y="182" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="199" y="203" text-anchor="middle" class="label">cat</text>
    <rect x="239" y="182" width="64" height="32" rx="6" class="card"/><rect x="239" y="182" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="271" y="203" text-anchor="middle" class="label">sat</text>
    <rect x="95" y="224" width="64" height="32" rx="6" class="card"/><rect x="95" y="224" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="127" y="245" text-anchor="middle" class="label">on</text>
    <rect x="167" y="224" width="64" height="32" rx="6" class="card"/><rect x="167" y="224" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="199" y="245" text-anchor="middle" class="label">the</text>
    <rect x="239" y="224" width="64" height="32" rx="6" class="card"/><rect x="239" y="224" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="271" y="245" text-anchor="middle" class="label">mat</text>
  </g>
  <text x="210" y="282" text-anchor="middle" class="muted" font-size="11">a word, part of a word, a comma... all tokens</text>

  <!-- arrow into the window -->
  <path d="M315,220 L548,220" fill="none" class="accentstroke" stroke-width="2" marker-end="url(#ah)"/>
  <text x="430" y="210" text-anchor="middle" class="muted" font-size="11">they fill it up</text>

  <!-- RIGHT: the context window -->
  <text x="615" y="104" text-anchor="middle" class="muted" font-size="11" font-weight="600" letter-spacing="1.5">CONTEXT WINDOW</text>
  <!-- gradient fill: healthy (bottom) -> drift -> hallucination (top) -->
  <rect x="560" y="124" width="110" height="286" fill="url(#zoneGrad)" fill-opacity="0.32"/>
  <rect x="560" y="124" width="110" height="286" fill="none" class="boxstroke" stroke-width="1.5"/>
  <!-- compact marker: dashed line + label at ~50% -->
  <path d="M560,267 L678,267" fill="none" class="accentstroke" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="552" y="264" text-anchor="end" class="accent" font-size="11" font-weight="600">I try to compact</text>
  <text x="552" y="278" text-anchor="end" class="muted" font-size="10">around here ~50%</text>
  <!-- zone labels -->
  <text x="684" y="154" class="accent" font-size="12" font-weight="700">overfilled</text>
  <text x="684" y="169" class="muted" font-size="10">hallucination risk</text>
  <text x="684" y="244" class="muted" font-size="12">accuracy drifts</text>
  <text x="684" y="259" class="muted" font-size="10">more often as it fills</text>
  <text x="684" y="354" class="ok" font-size="12" font-weight="700">healthy</text>
  <text x="615" y="430" text-anchor="middle" class="muted" font-size="11">up to 1,000,000 tokens</text>

  <text x="450" y="464" text-anchor="middle" font-size="13.5"><tspan class="accent" font-weight="700">Full is not better.</tspan><tspan class="muted" dx="6">Stuff it and the AI gets dumber, not smarter.</tspan></text>
</svg>
