# Link checker config. ALL link failures are FAIL.
# Known-flaky external domains go in the exclude list below.
# Each entry MUST have an "added: YYYY-MM-DD; expires: YYYY-MM-DD (90 days)" comment.
# CI warns when an entry is past expiry.

include_verbatim = false
no_progress = true
max_concurrency = 4
max_redirects = 5
timeout = 20
retry_wait_time = 2
accept = [200, 201, 202, 203, 204, 301, 302, 307, 308]

# Base URL for resolving root-relative links (href="/js/...") found in raw
# markdown. Hugo rewrites these at render but lychee scans raw .md and would
# otherwise fail with "Cannot convert path to URI: To resolve root-relative
# links in local files, provide a root dir". Resolved URLs go through the
# hoiboy.uk allowlist exclude below, so the production site doesn't get
# hammered by CI -- the path-construction just has to succeed.
base_url = "https://hoiboy.uk"

# File path globs to skip (lychee scans args from CLI, this filters them).
# `public/posts` is excluded because per-post pre-publish.sh already validates
# the rendered HTML for blog posts; `public/consulting` is INTENTIONALLY NOT
# excluded so consulting-ops#2 AC 0.4 (Cal.com URL liveness) can fire against
# the rendered consulting page HTML.
exclude_path = ["public/posts", "legacy", "node_modules", ".git", "content/posts", "docs/research", "scripts/tests/fixtures"]

# Domains explicitly excluded from link check (allowlist).
# Add entries with the comment format above. Empty by default.
exclude = [
  # Self-reference: README.md points at the live site, lychee then fetches
  # hoiboy.uk during CI which races against the same Cloudflare deploy that
  # the commit is about to trigger. Causes intermittent timeouts under load.
  # No value in self-checking; Hugo build + URL contract assertion already
  # validate the live site shape. added: 2026-04-08; expires: 2026-07-07 (90 days)
  "^https?://(www\\.)?hoiboy\\.uk(/.*)?$",
  # LinkedIn returns HTTP 999 (anti-bot rate-limit) to lychee's user-agent,
  # which is not a real HTTP status. Sidebar profile link cannot be liveness-
  # checked from CI without a logged-in cookie. added: 2026-05-06; expires: 2026-08-04 (90 days)
  "^https?://(www\\.)?linkedin\\.com(/.*)?$",
  # Meetup, Facebook and Instagram return 403/999 (anti-bot) to lychee's
  # user-agent, same class as linkedin above. Community join links on
  # /community/asians-gingers-in-tech/ (#43). Verified reachable in-browser
  # (200/308) 2026-07-10. added: 2026-07-10; expires: 2026-10-08 (90 days)
  "^https?://(www\\.)?meetup\\.com(/.*)?$",
  "^https?://(www\\.)?facebook\\.com(/.*)?$",
  "^https?://(www\\.)?instagram\\.com(/.*)?$",
  # TikTok and X (Twitter) return 403/anti-bot to lychee's user-agent, same
  # class as the community links above. /community/asians-gingers-in-tech/ (#43).
  # added: 2026-07-11; expires: 2026-10-09 (90 days)
  "^https?://(www\\.)?tiktok\\.com(/.*)?$",
  "^https?://(www\\.)?x\\.com(/.*)?$",
  "^https?://(www\\.)?twitter\\.com(/.*)?$",
  # Substack publication pages (asiansgingersintech.substack.com) return 403
  # Forbidden to lychee's user-agent (anti-bot), same class as the community
  # links above. /community/asians-gingers-in-tech/. Verified reachable
  # in-browser (200) 2026-07-18. added: 2026-07-18; expires: 2026-10-16 (90 days)
  "^https?://([a-z0-9-]+\\.)?substack\\.com(/.*)?$",
  # Cloudflare dashboard URLs require authentication; anonymous lychee
  # requests get 403. Referenced in cloudflare-api-token-setup.md runbook
  # as documented destinations for operator UI actions (token creation,
  # dashboard navigation). added: 2026-05-08; expires: 2026-08-06 (90 days)
  "^https?://dash\\.cloudflare\\.com(/.*)?$",
  # Cal.com booking pages (cal.eu is the EU-region host, cal.com the parent
  # service) intermittently return 403 Forbidden to lychee's user-agent
  # (anti-bot), so the booking URL https://cal.eu/hoiboyuk/discovery
  # (docs/cal-com-setup.md) flakes CI non-deterministically and cascade-skips
  # Deploy. Known-good anti-bot domain, same class as linkedin/cloudflare
  # above -- NOT a broken link.
  # consulting-ops#2 AC 0.4 interaction (intentional): this also suppresses
  # the SECONDARY lychee liveness check in pre-publish.sh:167
  # consulting_link_check for cal.* URLs in rendered public/consulting HTML.
  # That secondary check is anti-bot-403-unreliable for cal.* by nature
  # (same flake this entry fixes), so it was never a dependable guarantee.
  # The BINDING guard against a stale cal.com/OPERATOR_TODO URL is the
  # URL-agnostic literal string check (pre-publish.sh:89 consulting_yaml_check
  # + the independent .pre-commit-config.yaml OPERATOR_TODO hook) — neither
  # uses lychee or this allowlist, so the primary defence is unaffected.
  # added: 2026-05-18; expires: 2026-08-16 (90 days)
  "^https?://(www\\.)?cal\\.(eu|com)(/.*)?$",
  # Root-relative paths (href="/js/...", href="/legal/...", href="/private/...")
  # are Hugo internal paths that get rewritten at render time. Lychee scans
  # raw markdown and has no Hugo context, so it cannot resolve them without
  # a --base config that would only be correct for one class (static-file
  # paths OR content paths, never both). The earlier 'hugo --gc' build step
  # in the same CI job already fails on broken layouts / missing shortcodes /
  # undefined refs, so internal-link coverage is preserved.
  # added: 2026-05-10; expires: 2026-08-08 (90 days)
  "^/[^/]",
]
