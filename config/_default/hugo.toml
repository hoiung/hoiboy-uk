# Hugo site config. Single source of truth.
# Hugo version: pinned in /.hugo-version (read by CI and Cloudflare).
# Theme: NONE. We ship a minimal custom theme inside layouts/ + assets/.

baseURL = "https://hoiboy.uk"
languageCode = "en-gb"
title = "hoiboy.uk"
enableRobotsTXT = true
enableEmoji = false
disableHugoGeneratorInject = true

# Build hardening
[build]
  noJSConfigInAssets = true

# Output formats: HTML + RSS + sitemap (Hugo defaults), no JSON.
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# Categories primary, tags secondary. Per docs/research/06_TAXONOMY.md.
[taxonomies]
  category = "categories"
  tag = "tags"

# Permalinks for tags taxonomy. Categories use section landings instead
# of taxonomy permalink rewrite (avoids section vs taxonomy collision).
[permalinks]
  tags = "/tags/:slug/"

# Pagination for taxonomy term pages (food/, tech/, etc).
# Future-proofs for thousands of posts per category.
[pagination]
  pagerSize = 50

[markup]
  [markup.goldmark.renderer]
    unsafe = false
  [markup.highlight]
    style = "github"
    noClasses = false
    lineNos = false
