<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 534" width="900" height="534" role="img" aria-label="Three chat windows showing word relationships: a few words is clear; lots of words becomes a dense tangle the engine cannot hold straight; the same words wrapped in your own harness stay grouped and compacted. The real ceiling is the LLM engine and its built-in general harness, not the context window. The window is a cap set on purpose to stay inside that ceiling." font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0533a"/>
    </marker>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .trailstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .node { fill: #1a1a1a; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
        .trailstroke { stroke: #6a6a6a; }
        .node { fill: #f0f0f0; }
      }
    </style>
  </defs>

  <!-- own background so text contrast holds on any host -->
  <rect x="0" y="0" width="900" height="534" class="bg"/>

  <!-- brand watermark (top-right) -->
  <text x="885" y="24" text-anchor="end" class="watermark" font-size="11" font-weight="400" letter-spacing="0.5">hoiboy.uk</text>

  <!-- title + subtitle -->
  <text x="450" y="28" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">THE CONTEXT WINDOW IS A CAP, NOT THE CEILING</text>
  <text x="450" y="50" text-anchor="middle" class="muted" font-size="11.5">the engine can only relate so many words at once. the window is a limit, set on purpose, to keep you inside that.</text>

  <!-- ===================== PANEL A: A FEW WORDS ===================== -->
  <rect x="20" y="70" width="260" height="340" rx="10" class="card boxstroke" stroke-width="1.6"/>
  <text x="150" y="98" text-anchor="middle" class="label" font-size="14.5">A FEW WORDS</text>
  <text x="150" y="120" text-anchor="middle" class="ok" font-size="10.5" font-weight="700" letter-spacing="1.5">CLEAR</text>

  <!-- links (behind pills) -->
  <g class="trailstroke" stroke-width="1.3">
    <line x1="88" y1="182" x2="206" y2="184"/>
    <line x1="88" y1="182" x2="148" y2="232"/>
    <line x1="206" y1="184" x2="148" y2="232"/>
    <line x1="148" y1="232" x2="80" y2="288"/>
    <line x1="148" y1="232" x2="216" y2="286"/>
    <line x1="80" y1="288" x2="216" y2="286"/>
    <line x1="80" y1="288" x2="120" y2="344"/>
    <line x1="216" y1="286" x2="210" y2="344"/>
    <line x1="120" y1="344" x2="210" y2="344"/>
  </g>

  <!-- word pills -->
  <rect x="63" y="170" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="88" y="186" text-anchor="middle" class="label" font-size="12.5">you</text>
  <rect x="181" y="172" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="206" y="188" text-anchor="middle" class="label" font-size="12.5">ask</text>
  <rect x="123" y="220" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="148" y="236" text-anchor="middle" class="label" font-size="12.5">bug</text>
  <rect x="53" y="276" width="54" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="80" y="292" text-anchor="middle" class="label" font-size="12.5">logs</text>
  <rect x="189" y="274" width="54" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="216" y="290" text-anchor="middle" class="label" font-size="12.5">code</text>
  <rect x="93" y="332" width="54" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="120" y="348" text-anchor="middle" class="label" font-size="12.5">test</text>
  <rect x="185" y="332" width="50" height="24" rx="9" class="card boxstroke" stroke-width="1.4"/>
  <text x="210" y="348" text-anchor="middle" class="label" font-size="12.5">fix</text>

  <text x="150" y="392" text-anchor="middle" class="muted" font-size="11">every link is easy to follow</text>

  <!-- ===================== PANEL B: LOTS OF WORDS (overloaded) ===================== -->
  <rect x="320" y="70" width="260" height="340" rx="10" class="card accentstroke" stroke-width="2.6"/>
  <text x="450" y="98" text-anchor="middle" class="label" font-size="14.5">LOTS OF WORDS</text>
  <text x="450" y="120" text-anchor="middle" class="accent" font-size="10.5" font-weight="700" letter-spacing="1.5">AT THE LIMIT</text>

  <!-- tangle of links -->
  <g stroke-width="1">
    <line x1="366" y1="162" x2="432" y2="158" class="trailstroke"/>
    <line x1="432" y1="158" x2="500" y2="164" class="trailstroke"/>
    <line x1="500" y1="164" x2="548" y2="156" class="trailstroke"/>
    <line x1="366" y1="162" x2="352" y2="206" class="trailstroke"/>
    <line x1="366" y1="162" x2="420" y2="202" class="trailstroke"/>
    <line x1="432" y1="158" x2="420" y2="202" class="accentstroke"/>
    <line x1="432" y1="158" x2="486" y2="200" class="trailstroke"/>
    <line x1="500" y1="164" x2="486" y2="200" class="trailstroke"/>
    <line x1="500" y1="164" x2="546" y2="212" class="trailstroke"/>
    <line x1="548" y1="156" x2="546" y2="212" class="trailstroke"/>
    <line x1="352" y1="206" x2="420" y2="202" class="trailstroke"/>
    <line x1="420" y1="202" x2="486" y2="200" class="accentstroke"/>
    <line x1="486" y1="200" x2="546" y2="212" class="trailstroke"/>
    <line x1="352" y1="206" x2="368" y2="252" class="trailstroke"/>
    <line x1="420" y1="202" x2="368" y2="252" class="trailstroke"/>
    <line x1="420" y1="202" x2="434" y2="250" class="trailstroke"/>
    <line x1="486" y1="200" x2="434" y2="250" class="trailstroke"/>
    <line x1="486" y1="200" x2="502" y2="254" class="trailstroke"/>
    <line x1="546" y1="212" x2="548" y2="256" class="trailstroke"/>
    <line x1="368" y1="252" x2="434" y2="250" class="trailstroke"/>
    <line x1="434" y1="250" x2="502" y2="254" class="accentstroke"/>
    <line x1="502" y1="254" x2="548" y2="256" class="trailstroke"/>
    <line x1="368" y1="252" x2="360" y2="300" class="trailstroke"/>
    <line x1="434" y1="250" x2="360" y2="300" class="trailstroke"/>
    <line x1="434" y1="250" x2="428" y2="298" class="accentstroke"/>
    <line x1="502" y1="254" x2="428" y2="298" class="trailstroke"/>
    <line x1="502" y1="254" x2="496" y2="302" class="trailstroke"/>
    <line x1="548" y1="256" x2="544" y2="300" class="trailstroke"/>
    <line x1="360" y1="300" x2="428" y2="298" class="trailstroke"/>
    <line x1="428" y1="298" x2="496" y2="302" class="trailstroke"/>
    <line x1="496" y1="302" x2="544" y2="300" class="trailstroke"/>
    <line x1="360" y1="300" x2="398" y2="348" class="trailstroke"/>
    <line x1="428" y1="298" x2="398" y2="348" class="accentstroke"/>
    <line x1="428" y1="298" x2="470" y2="350" class="trailstroke"/>
    <line x1="496" y1="302" x2="470" y2="350" class="trailstroke"/>
    <line x1="496" y1="302" x2="398" y2="348" class="trailstroke"/>
  </g>

  <!-- word dots -->
  <g>
    <circle cx="366" cy="162" r="4" class="node"/>
    <circle cx="432" cy="158" r="4" class="node"/>
    <circle cx="500" cy="164" r="4" class="node"/>
    <circle cx="548" cy="156" r="4" class="node"/>
    <circle cx="352" cy="206" r="4" class="node"/>
    <circle cx="420" cy="202" r="4.5" class="accent"/>
    <circle cx="486" cy="200" r="4" class="node"/>
    <circle cx="546" cy="212" r="4" class="node"/>
    <circle cx="368" cy="252" r="4" class="node"/>
    <circle cx="434" cy="250" r="4.5" class="accent"/>
    <circle cx="502" cy="254" r="4.5" class="accent"/>
    <circle cx="548" cy="256" r="4" class="node"/>
    <circle cx="360" cy="300" r="4" class="node"/>
    <circle cx="428" cy="298" r="4.5" class="accent"/>
    <circle cx="496" cy="302" r="4" class="node"/>
    <circle cx="544" cy="300" r="4" class="node"/>
    <circle cx="398" cy="348" r="4" class="node"/>
    <circle cx="470" cy="350" r="4" class="node"/>
  </g>

  <text x="450" y="392" text-anchor="middle" class="muted" font-size="11">more links than it can hold</text>

  <!-- ===================== PANEL C: SAME + YOUR HARNESS ===================== -->
  <rect x="620" y="70" width="260" height="340" rx="10" class="card boxstroke" stroke-width="1.6"/>
  <text x="750" y="98" text-anchor="middle" class="label" font-size="14">SAME + YOUR HARNESS</text>
  <text x="750" y="120" text-anchor="middle" class="ok" font-size="10.5" font-weight="700" letter-spacing="1.5">KEPT IN CHECK</text>

  <!-- harness frame: its top dashed line runs through the centre of the YOUR HARNESS label; sized to leave equal left/right margins and clear the inner clusters top + bottom -->
  <rect x="632" y="145" width="236" height="215" rx="8" fill="none" class="accentstroke" stroke-width="1.4" stroke-dasharray="5 4"/>
  <!-- label sits on the frame's top edge; its card fill breaks the dashed line like a legend -->
  <rect x="688" y="136" width="88" height="18" rx="9" class="card accentstroke" stroke-width="1.2"/>
  <text x="732" y="148.5" text-anchor="middle" class="accent" font-size="9.5" font-weight="700" letter-spacing="1">YOUR HARNESS</text>

  <!-- cluster groupings (dashed) -->
  <rect x="641" y="162" width="100" height="92" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="773" y="160" width="86" height="140" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="645" y="264" width="116" height="82" rx="8" fill="none" class="boxstroke" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- tidy links within clusters + a few connectors -->
  <g stroke-width="1.1" class="trailstroke">
    <line x1="657" y1="176" x2="715" y2="176"/>
    <line x1="657" y1="176" x2="651" y2="210"/>
    <line x1="715" y1="176" x2="705" y2="212"/>
    <line x1="651" y1="210" x2="675" y2="238"/>
    <line x1="705" y1="212" x2="731" y2="232"/>
    <line x1="651" y1="210" x2="705" y2="212"/>
    <line x1="675" y1="238" x2="731" y2="232"/>
    <line x1="789" y1="176" x2="843" y2="172"/>
    <line x1="789" y1="176" x2="785" y2="224"/>
    <line x1="843" y1="172" x2="839" y2="228"/>
    <line x1="785" y1="224" x2="839" y2="228"/>
    <line x1="785" y1="224" x2="795" y2="280"/>
    <line x1="839" y1="228" x2="841" y2="284"/>
    <line x1="795" y1="280" x2="841" y2="284"/>
    <line x1="659" y1="276" x2="723" y2="274"/>
    <line x1="659" y1="276" x2="687" y2="306"/>
    <line x1="723" y1="274" x2="747" y2="302"/>
    <line x1="687" y1="306" x2="665" y2="330"/>
    <line x1="747" y1="302" x2="727" y2="328"/>
    <line x1="687" y1="306" x2="747" y2="302"/>
    <line x1="665" y1="330" x2="727" y2="328"/>
    <line x1="705" y1="212" x2="789" y2="176"/>
    <line x1="675" y1="238" x2="659" y2="276"/>
    <line x1="795" y1="280" x2="747" y2="302"/>
  </g>

  <!-- word dots -->
  <g>
    <circle cx="657" cy="176" r="4" class="node"/>
    <circle cx="715" cy="176" r="4" class="node"/>
    <circle cx="651" cy="210" r="4" class="node"/>
    <circle cx="705" cy="212" r="4" class="node"/>
    <circle cx="675" cy="238" r="4" class="node"/>
    <circle cx="731" cy="232" r="4" class="node"/>
    <circle cx="789" cy="176" r="4" class="node"/>
    <circle cx="843" cy="172" r="4" class="node"/>
    <circle cx="785" cy="224" r="4" class="node"/>
    <circle cx="839" cy="228" r="4" class="node"/>
    <circle cx="795" cy="280" r="4" class="node"/>
    <circle cx="841" cy="284" r="4" class="node"/>
    <circle cx="659" cy="276" r="4" class="node"/>
    <circle cx="723" cy="274" r="4" class="node"/>
    <circle cx="687" cy="306" r="4" class="node"/>
    <circle cx="747" cy="302" r="4" class="node"/>
    <circle cx="665" cy="330" r="4" class="node"/>
    <circle cx="727" cy="328" r="4" class="node"/>
  </g>

  <!-- green automation markers, one per cluster -->
  <circle cx="645" cy="166" r="3.2" class="ok"/>
  <circle cx="777" cy="164" r="3.2" class="ok"/>
  <circle cx="649" cy="268" r="3.2" class="ok"/>

  <text x="750" y="376" text-anchor="middle" class="muted" font-size="11">tasks broken down +<tspan x="750" dy="14">regularly compacted per implementation</tspan></text>

  <!-- ===================== arrows down to the engine ===================== -->
  <line x1="150" y1="412" x2="150" y2="446" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="412" x2="450" y2="446" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="412" x2="750" y2="446" class="accentstroke" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- engine bar = the real ceiling -->
  <rect x="20" y="450" width="860" height="44" rx="10" class="card accentstroke" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" class="label" font-size="13">THE LLM ENGINE + ITS OWN GENERAL HARNESS</text>
  <text x="450" y="487" text-anchor="middle" class="muted" font-size="11">the real ceiling: how many word-links it can hold at once (the part even I cannot see inside)</text>

  <!-- verdict -->
  <text x="450" y="518" text-anchor="middle" font-size="13.5">
    <tspan class="muted">The window was never the real ceiling.</tspan><tspan class="accent" font-weight="700" dx="10">The engine is. The window just caps you to stay inside it.</tspan>
  </text>
</svg>
