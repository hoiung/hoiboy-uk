{{- /* Image-first cards grouped by year. */ -}}
{{- range (. | first 9999).GroupByDate "2006" -}}
  <section class="year-group">
    <h2>{{ .Key }}</h2>
    <div class="cards">
      {{- range .Pages -}}
        <a class="card" href="{{ .RelPermalink }}">
          {{- $hero := partial "hero-pick.html" . -}}
          {{- $title := .Title -}}
          {{- with $hero -}}
            <img src="{{ .RelPermalink }}" alt="{{ $title }}" loading="lazy">
          {{- end -}}
          <h3>{{ .Title }}</h3>
          <span class="date">{{ .Date.Format "2 Jan" }}</span>
        </a>
      {{- end -}}
    </div>
  </section>
{{- end -}}
