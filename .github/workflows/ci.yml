name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site (strict)
        run: hugo --minify --gc

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            content/**/*.md
            docs/**/*.md
            README.md

      - name: Link check (offline + live)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 4 './**/*.md'
          fail: false
