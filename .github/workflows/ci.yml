name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_ENV: production
      GOMEMLIMIT: 2GiB
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Secret detection (blocking)
        run: python3 scripts/check-public-repo-secrets.py .

      - name: Commit-message secret scan — push events (blocking)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          # On a force-push the before-SHA sits on a rewritten (now-unreachable) line and
          # is absent from the checkout, so `git log <before>..HEAD` would exit 128 and red
          # the build for a non-content reason. Fall back to scanning the tip commit only
          # in that case (its message is the one the rewrite just introduced). BEFORE_SHA is
          # passed via env: (not inline interpolation) per workflow-injection hardening.
          if git rev-parse -q --verify "${BEFORE_SHA}^{commit}" >/dev/null 2>&1 \
             && git merge-base --is-ancestor "$BEFORE_SHA" HEAD 2>/dev/null; then
            SINCE="$BEFORE_SHA"
          else
            echo "::notice::before SHA $BEFORE_SHA unreachable (force-push/rewrite) - scanning HEAD commit only"
            SINCE='HEAD~1'
          fi
          python3 scripts/check-public-repo-secrets.py \
            --scan-commit-messages \
            --since "$SINCE"

      - name: Commit-message secret scan — PR events (blocking)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/check-public-repo-secrets.py \
            --scan-commit-messages \
            --since ${{ github.event.pull_request.base.sha }}

      - name: Read pinned Hugo version
        id: hugo_version
        run: |
          if [ ! -f .hugo-version ]; then
            echo "::error::.hugo-version missing"
            exit 1
          fi
          V=$(cat .hugo-version | tr -d '[:space:]')
          if [ -z "$V" ]; then
            echo "::error::.hugo-version is empty"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Setup Hugo (pinned)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ steps.hugo_version.outputs.version }}
          extended: true

      - name: Assert Hugo version matches .hugo-version
        run: |
          INSTALLED=$(hugo version | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//')
          PINNED=${{ steps.hugo_version.outputs.version }}
          if [ "$INSTALLED" != "$PINNED" ]; then
            echo "::error::Hugo version drift: installed=$INSTALLED pinned=$PINNED"
            exit 1
          fi

      - name: Hugo cache
        uses: actions/cache@v5
        with:
          path: |
            resources/_gen
            /tmp/hugo_cache
          key: hugo-${{ runner.os }}-${{ hashFiles('.hugo-version', 'content/**', 'assets/**', 'layouts/**', 'config/**') }}
          restore-keys: |
            hugo-${{ runner.os }}-

      - name: Em-dash voice guard (zero tolerance)
        # Single source: scripts/check_emdash_zero_tolerance.sh \u2014 the SAME script the
        # check-emdash-zero-tolerance pre-commit hook runs, so local commit gate + CI
        # can never drift. Before the script existed this grep was CI-only, so an em
        # dash in unmarked docs prose passed pre-commit and silently froze the deploy
        # (blog-priv#38). Scope rationale (posts / meet-recorder / scripts exclusions)
        # lives in that script.
        run: bash scripts/check_emdash_zero_tolerance.sh

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install --quiet -r requirements-dev.txt

      - name: EXIF detector (no identifying metadata in tracked images)
        run: python3 scripts/check-exif.py

      - name: EXIF detector unit tests
        run: python3 -m pytest scripts/test_check_exif.py -q

      - name: Voice guard tells (marker-driven, new posts only)
        run: python3 scripts/check-ai-writing-tells.py --mode blog --check-only-new content/ docs/

      - name: iamhoi wrapping guard (new posts) — CI mirror of pre-commit hook
        run: python3 scripts/check-iamhoi-wrapping.py --check-only-new

      - name: Em-dash guard (new posts, date-gated) — covers unmarked new-post prose
        run: python3 scripts/check_emdash_newposts.py

      - name: consulting.yaml OPERATOR_TODO guard — CI mirror of pre-commit hook
        run: |
          if [ -f data/consulting.yaml ] && grep -F OPERATOR_TODO data/consulting.yaml; then
            echo "::error::data/consulting.yaml contains OPERATOR_TODO placeholder; replace before commit"
            exit 1
          fi

      - name: Word-count ceiling
        run: |
          python3 scripts/check_wordcount.py $(git ls-files 'content/posts/*/index.md')

      - name: Voice guard unit tests
        run: python3 -m pytest scripts/test_voice_guard.py -q

      - name: Word-count hook unit tests
        run: python3 -m pytest scripts/test_check_wordcount.py -q

      - name: Internal-links + meet-recorder content unit tests
        run: python3 -m pytest scripts/test_validate_internal_links.py tests/test_meet_recorder_content.py -q

      - name: Em-dash new-post guard unit tests
        run: python3 -m pytest scripts/test_check_emdash_newposts.py -q

      - name: Config-traceability + iamhoi-wrapping unit tests
        run: python3 -m pytest scripts/test_check_config_traceability.py scripts/test_check_iamhoi_wrapping.py -q

      - name: Social-card guard unit tests
        run: python3 -m pytest scripts/test_check_social_cards.py -q

      # Cloudflare reclassifies Googlebot/Applebot/BingBot as blocked on
      # 2026-09-15 for any zone that has selected to block Training. These zones
      # have. So a setting that is correct today becomes an SEO outage on a
      # known date unless somebody decides first, and no repo change would show
      # it. This step goes red from 2026-09-01 while the decision marker in
      # docs/research/17_AI_CRAWLER_FRAMEWORK.md still reads `pending`.
      #
      # It is listed here BY NAME on purpose: the first version of this gate
      # shipped documented as "not advice in a document; it is a gate" while no
      # workflow invoked it, which is the same defect the frontmatter comment
      # below describes. Ralph caught it. A guard nothing runs guards nothing.
      - name: AI-training migration deadline gate
        run: python3 scripts/check_ai_training_deadline.py

      - name: AI-training deadline gate unit tests
        run: python3 -m pytest scripts/test_check_ai_training_deadline.py -q

      # Posts require title/date/categories/tags/description; project pages
      # under content/hire-hoi/ require title/description. `description` is
      # REQUIRED since blog-priv#55 Phase 2: without it a page inherits the
      # site-default meta description and ships as a near-duplicate. SEO
      # hygiene, not a GEO lever. This step covers the posts tree only; the
      # project-page tree is the separate, disjoint step below.
      - name: Frontmatter validator (posts, incl. description)
        run: python3 scripts/validate_frontmatter.py --scope posts

      # Disjoint from the posts step above; the two together cover the whole
      # tree exactly once. They were previously nested (a bare whole-tree run,
      # then a subset re-run), which made this step unable to fail
      # independently. `if: always()` is load-bearing: without it GHA skips
      # this step whenever the posts step failed, and now that the scopes are
      # disjoint that would drop project-page coverage entirely rather than
      # just lose an attribution label. Guarded by tests/test_gate_wiring.py.
      - name: Frontmatter validator (project pages, incl. description)
        if: always()
        run: python3 scripts/validate_frontmatter.py --scope consulting

      - name: Config traceability check
        run: python3 scripts/check_config_traceability.py

      - name: Validate internal markdown links
        run: python3 scripts/validate_internal_links.py

      - name: Social-card guard (every singular page owns its og:image card)
        run: python3 scripts/check_social_cards.py

      - name: Setup Node (meet-recorder JS tests)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps
        run: npm ci

      - name: meet-recorder JS tests
        run: npm test

      - name: Hugo build (production)
        run: |
          hugo --gc --minify -e production 2>&1 | tee /tmp/hugo-build.log
          # Bidirectional warning allowlist check (strip absolute paths for portability)
          ACTUAL=$(grep -iE 'warn|error' /tmp/hugo-build.log | sed 's|"/[^"]*/content/|"content/|g' | sort -u || true)
          ALLOWED=$(grep -v '^#' .hugo-warning-allowlist | grep -v '^$' | sort -u || true)
          NEW=$(comm -23 <(echo "$ACTUAL") <(echo "$ALLOWED"))
          DEAD=$(comm -13 <(echo "$ACTUAL") <(echo "$ALLOWED"))
          if [ -n "$NEW" ]; then
            echo "::error::New Hugo warnings outside allowlist:"
            echo "$NEW"
            exit 1
          fi
          if [ -n "$DEAD" ]; then
            echo "::error::Dead allowlist entries (no longer in build):"
            echo "$DEAD"
            exit 1
          fi

      - name: Social-card guard (rendered og:image — template-regression backstop)
        run: python3 scripts/check_social_cards.py --built public

      - name: URL contract assertion
        run: |
          set -e
          for p in food-booze adventure dance tech-ai life entrepreneurship trading tags posts; do
            test -f "public/$p/index.html" || { echo "::error::missing /$p/index.html"; exit 1; }
          done
          test -f "public/index.html" || { echo "::error::missing root index.html"; exit 1; }
          test -f "public/index.xml" || { echo "::error::missing root RSS feed"; exit 1; }
          test -f "public/sitemap.xml" || { echo "::error::missing sitemap.xml"; exit 1; }
          test -f "public/robots.txt" || { echo "::error::missing robots.txt"; exit 1; }
          test -f "public/posts/foundation/index.html" || { echo "::error::missing foundation post"; exit 1; }
          test -f "public/tags/foundation/index.html" || { echo "::error::missing foundation tag page"; exit 1; }
          echo "URL contract OK"

      - name: RSS validates locally + jq schema asserts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils jq
          xmllint --noout public/index.xml
          xmllint --noout public/sitemap.xml

      # test_gate_wiring.py asserts the content roots main() ACTUALLY walks, so a
      # root silently dropped from the gate fails here. It was delivered by
      # blog-priv#55 and referenced at line 176 as the thing guarding that
      # attribution, but it was never added to any pytest invocation: CI runs
      # pytest through explicit file lists, so a file nobody lists never runs.
      # A guard that cannot fail guards nothing, which is the exact defect class
      # this issue spent 24 Ralph rounds on. Caught by the Stage 5 audit.
      - name: Frontmatter parser unit tests
        run: python3 -m pytest scripts/test_validate_frontmatter.py tests/test_gate_wiring.py -q

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          config: .markdownlint.json
          globs: |
            content/**/*.md
            !content/posts/**
            docs/**/*.md
            README.md

      # Runs on every push, not just when lychee.toml changes: the failure mode
      # is the passage of time, so a repo nobody touches is exactly where an
      # entry goes stale. lychee.toml's header claimed CI enforced this and
      # nothing did, until an entry sat 13 days past expiry (blog-priv#55
      # Stage 5). Ordered before the link check so the reason a URL is being
      # skipped is re-confirmed before it is skipped.
      - name: Lychee allowlist expiry
        run: python3 scripts/check_lychee_expiry.py

      - name: Lychee allowlist expiry unit tests
        run: python3 -m pytest scripts/test_check_lychee_expiry.py -q

      # Exit-contract tests for the crawler probe. Hermetic: they stand up a
      # local UA-aware HTTP server, so all three exits are produced offline.
      # The probe's only prior evidence was a live run against the production
      # edge, which cannot yield a PASS while Cloudflare blocks the citation
      # class, and cannot yield the inconclusive case at all.
      - name: AI crawler probe exit-contract tests
        run: python3 -m pytest scripts/test_check_ai_crawler_access.py -q

      # Wiring guard for the vendored drift-check pair (check-mirror-drift.py +
      # sst3_mirror_utils.py). Listed explicitly because CI runs pytest through
      # named file lists, not a directory sweep, so a test file nobody lists
      # never runs. That is the exact hole a gate-wiring test fell through
      # earlier in this issue, and the half-sync this guard catches is what
      # Ralph round 9 found, so leaving it CI-orphaned would be the same defect
      # twice.
      - name: Vendored drift-check pair wiring tests
        run: python3 -m pytest scripts/test_check_mirror_drift_wiring.py -q

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml './**/*.md'
          fail: true

      - name: Cache hygiene
        if: always()
        run: |
          if [ -d resources/_gen ]; then
            find resources/_gen -atime +30 -delete 2>/dev/null || true
          fi

      - name: Upload public artifact
        uses: actions/upload-artifact@v7
        with:
          name: public
          path: public
          retention-days: 7
