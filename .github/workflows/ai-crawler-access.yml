# Scheduled, NON-BLOCKING probe of the live edge's AI-crawler policy.
#
# Why scheduled and not a pre-commit hook or a CI gate (blog-priv#55 AC 10.3):
# this check needs network and hits third-party-facing infrastructure, so it
# cannot run offline and must never block a commit or a deploy. The thing it
# watches is an EDGE setting, which can regress with no repo change at all.
# That is exactly how the block went unnoticed from 2026-05-31 to 2026-07-20.
#
# Non-blocking means the job reports; it does not gate. A red run here is a
# signal to open the Cloudflare dashboard, not a reason to stop shipping.
name: AI crawler access (scheduled, non-blocking)

on:
  schedule:
    # 07:15 UTC Mondays. Weekly is enough for a setting that changes rarely and
    # only by human action, and it keeps third-party request volume negligible.
    - cron: '15 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Record the tri-state exit code without letting it end the job here, so
      # the summary below always runs. The verdict step decides red vs green.
      - name: Probe live AI-crawler access
        id: probe
        run: |
          set +e
          bash scripts/check-ai-crawler-access.sh
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarise
        if: always()
        env:
          OUTCOME: ${{ steps.probe.outputs.code == '0' && 'success' || 'failure' }}
        run: |
          {
            printf '## AI crawler access probe\n\n'
            printf 'Outcome: `%s`\n\n' "$OUTCOME"
            if [ "$OUTCOME" = "success" ]; then
              printf 'All citation-class crawlers reachable.\n\n'
              printf 'This means they are NOT blocked. It does not mean the site is cited;\n'
              printf 'no reliable method for measuring AI citation currently exists.\n'
            else
              printf 'At least one citation-class crawler is blocked, or the probe could not complete.\n\n'
              printf 'A 403 guarantees zero citation from that engine. No repo change can fix it.\n'
              printf 'Check the Cloudflare dashboard for this zone:\n\n'
              printf '1. "Block AI bots" managed toggle OFF\n'
              printf '2. AI Crawl Control set to Allow for the citation class\n'
              printf '3. managed-robots.txt OFF\n'
              printf '4. Bot Fight Mode off, or skipping verified bots\n\n'
              printf 'Detail: `docs/research/16_AI_BOT_AND_SEO_POLICY.md`\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # The verdict. This is the whole point of the job: a confirmed block must
      # turn the run RED so it notifies. Marking the step advisory would make a
      # 6-of-6 block report a green tick and reproduce the exact silence this
      # workflow exists to break (unnoticed 2026-05-31 to 2026-07-20).
      #
      # The job is non-blocking BY CONSTRUCTION: schedule + workflow_dispatch
      # only, no push or pull_request trigger, so it can never gate a commit or
      # a deploy. Red here means "go look at the dashboard", not "stop shipping".
      #
      # Exit 2 is deliberately NOT red: it means the probe could not tell
      # (network, origin error), and crying wolf on an inconclusive run is how a
      # standing alert gets ignored.
      - name: Verdict
        if: always()
        env:
          CODE: ${{ steps.probe.outputs.code }}
        run: |
          case "$CODE" in
            0) printf 'PASS: no citation-class crawler is blocked.\n' ;;
            1) printf >&2 'FAIL: a citation-class crawler is blocked at the edge.\n'
               printf >&2 'Operator action required in the Cloudflare dashboard; see the job summary.\n'
               exit 1 ;;
            2) printf '::warning::AI crawler probe could not complete (exit 2). Verdict withheld, not a confirmed block.\n' ;;
            *) printf >&2 'Unexpected probe exit code: %s\n' "$CODE"; exit 1 ;;
          esac
