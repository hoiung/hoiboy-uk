# Scheduled, NON-BLOCKING probe of the live edge's AI-crawler policy.
#
# Why scheduled and not a pre-commit hook or a CI gate (blog-priv#55 AC 10.3):
# this check needs network and hits third-party-facing infrastructure, so it
# cannot run offline and must never block a commit or a deploy. The thing it
# watches is an EDGE setting, which can regress with no repo change at all.
# That is exactly how the block went unnoticed from 2026-05-31 to 2026-07-20.
#
# Non-blocking means the job reports; it does not gate. A red run here is a
# signal to open the Cloudflare dashboard, not a reason to stop shipping.
name: AI crawler access (scheduled, non-blocking)

on:
  schedule:
    # 07:15 UTC Mondays. Weekly is enough for a setting that changes rarely and
    # only by human action, and it keeps third-party request volume negligible.
    - cron: '15 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    # The estate is three zones and the script was built to take any URL
    # ("takes any domain, so one script covers the estate"). It was nonetheless
    # invoked with no argument, so it fell through to its hardcoded hoiboy.uk
    # default and two of the three zones had no standing watch at all. That was
    # a wiring omission rather than a limitation: cuarchitects.co.uk is
    # reachable and probeable right now.
    #
    # speak2lola.com is deliberately absent: it has no DNS, so it can only ever
    # return the inconclusive exit 2. Adding it would produce a permanent
    # warning that trains the reader to ignore this job. Add it when the domain
    # resolves.
    #
    # fail-fast is off so one zone's failure still reports the others; a
    # per-zone red is the signal, and hiding the rest would waste the run.
    strategy:
      fail-fast: false
      matrix:
        target:
          - https://hoiboy.uk/
          - https://cuarchitects.co.uk/
    steps:
      - uses: actions/checkout@v6

      # Record the tri-state exit code without letting it end the job here, so
      # the summary below always runs. The verdict step decides red vs green.
      - name: Probe live AI-crawler access
        id: probe
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set +e
          bash scripts/check-ai-crawler-access.sh "$TARGET"
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarise
        if: always()
        env:
          # Three-way, matching the script's tri-state contract. A binary
          # label would print "failure" for exit 2, contradicting the Verdict
          # step's deliberate choice not to treat inconclusive as a block.
          CODE: ${{ steps.probe.outputs.code }}
          TARGET: ${{ matrix.target }}
        run: |
          case "$CODE" in
            0) OUTCOME=success ;;
            1) OUTCOME=policy-failure ;;
            2) OUTCOME=inconclusive ;;
            *) OUTCOME=unknown ;;
          esac
          {
            printf '## AI crawler access probe\n\n'
            printf 'Target: `%s`\n\n' "$TARGET"
            printf 'Outcome: `%s` (exit %s)\n\n' "$OUTCOME" "$CODE"
            if [ "$OUTCOME" = "inconclusive" ]; then
              printf 'The probe could not complete: request failure, origin error or an\n'
              printf 'unrecognised status. This is NOT a confirmed block and the job is\n'
              printf 'deliberately not failed for it. Re-run to confirm.\n'
            elif [ "$OUTCOME" = "success" ]; then
              printf 'All citation-class crawlers reachable, and every training-class token\n'
              printf 'carries a full robots.txt opt-out.\n\n'
              printf 'Citation reachability means they are NOT blocked. It does not mean the\n'
              printf 'site is cited; no reliable method for measuring AI citation currently\n'
              printf 'exists. The training half of this verdict reads robots.txt, which is a\n'
              printf 'REQUEST rather than enforcement: only the WAF custom rule hard-blocks,\n'
              printf 'and only for tokens that send a matching user-agent.\n'
            elif [ "$OUTCOME" != "policy-failure" ]; then
              # The case above can produce `unknown`, and this branch has to
              # exist for it. The probe script only ever exits 0, 1 or 2, so
              # anything else means the script did not run to a verdict at all
              # (renamed path, permission error, killed step: bash returns 126,
              # 127, 143). Falling through to the blocked text below would
              # assert a crawler denial nobody observed and send the operator
              # to the Cloudflare dashboard to fix the wrong system, while the
              # real fault, a broken invocation, went unread. The Verdict step
              # already handles this correctly; the summary is the more visible
              # surface and was contradicting it (Ralph round 20).
              printf 'The probe did not run to a verdict. Exit %s is outside the\n' "$CODE"
              printf 'scripts tri-state contract of 0, 1 or 2, so no crawler was\n'
              printf 'classified. This is NOT a block: check the Probe step log for a\n'
              printf 'missing script path, a permission error or a killed step.\n'
            else
              printf 'POLICY FAILURE. Exit 1 now means EITHER of two things, so read the\n'
              printf 'Probe step log to see which before acting:\n\n'
              printf '  (a) a citation-class crawler is BLOCKED, or\n'
              printf '  (b) a training-class token is NOT opted out in robots.txt.\n\n'
              printf 'They need opposite fixes, and the remediation below addresses (a).\n'
              printf 'For (b) the training block has regressed: check that managed\n'
              printf 'robots.txt is still ON for the zone, that the WAF custom rule is still\n'
              printf 'present in the http_request_firewall_custom phase, and that the origin\n'
              printf 'robots.txt has not grown a group re-permitting a blocked token.\n\n'
              printf 'For (a): an access denial guarantees zero citation from that engine. No repo change can fix it.\n'
              printf 'Check the Cloudflare dashboard for this zone:\n\n'
              printf '1. `ai_bots_protection` / "Block AI bots" set to DISABLED. This is the\n'
              printf '   coarse legacy switch and was the measured cause on hoiboy.uk; it takes\n'
              printf '   the citation class down together with training.\n'
              printf '2. AI Crawl Control set to Allow for the citation class\n'
              printf '   (`ai_search` and `ai_user` DISABLED; `ai_training` may stay block)\n'
              printf '3. Bot Fight Mode off, or skipping verified bots\n\n'
              printf 'Do NOT turn managed robots.txt off to fix this. It cannot cause a 403,\n'
              printf 'so it is never the cause here, and it is the mechanism that carries the\n'
              printf 'training block. Disabling it would silently drop the training opt-out\n'
              printf 'while doing nothing for the citation failure being reported.\n\n'
              printf 'Detail: `docs/research/17_AI_CRAWLER_FRAMEWORK.md`\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # The verdict. This is the whole point of the job: a confirmed block must
      # turn the run RED so it notifies. Marking the step advisory would make a
      # 6-of-6 block report a green tick and reproduce the exact silence this
      # workflow exists to break (unnoticed 2026-05-31 to 2026-07-20).
      #
      # The job is non-blocking BY CONSTRUCTION: schedule + workflow_dispatch
      # only, no push or pull_request trigger, so it can never gate a commit or
      # a deploy. Red here means "go look at the dashboard", not "stop shipping".
      #
      # Exit 2 is deliberately NOT red: it means the probe could not tell
      # (network, origin error), and crying wolf on an inconclusive run is how a
      # standing alert gets ignored.
      - name: Verdict
        if: always()
        env:
          CODE: ${{ steps.probe.outputs.code }}
          TARGET: ${{ matrix.target }}
        run: |
          case "$CODE" in
            0) printf 'PASS (%s): no citation-class crawler is blocked, and every\n' "$TARGET"
               printf 'training-class token carries a full robots.txt opt-out.\n' ;;
            1) printf >&2 'FAIL (%s): the crawler policy has regressed.\n' "$TARGET"
               printf >&2 'EITHER a citation-class crawler is blocked at the edge, OR a\n'
               printf >&2 'training-class token is no longer opted out. These need opposite\n'
               printf >&2 'fixes, so read the Probe step log to see which before acting.\n'
               printf >&2 'Operator action required; see the job summary.\n'
               exit 1 ;;
            2) printf '::warning::AI crawler probe could not complete (exit 2). Verdict withheld, not a confirmed block.\n' ;;
            *) printf >&2 'Unexpected probe exit code: %s\n' "$CODE"; exit 1 ;;
          esac
