<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 462" width="900" height="462" role="img" aria-label="The stack split by language" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .trailstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
        .trailstroke { stroke: #6a6a6a; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="462" class="bg"/>
  <text x="885" y="24" text-anchor="end" class="watermark" font-size="11" font-weight="400" letter-spacing="0.5">hoiboy.uk</text>

  <text x="450" y="30" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">WHAT'S WRITTEN IN WHAT</text>
  <text x="450" y="52" text-anchor="middle" class="muted" font-size="11.5">Python for the heavy lifting, Rust for the always-on plumbing, React for the screen.</text>

  <!-- Python lane -->
  <rect fill="none" class="boxstroke" x="24" y="78" width="276" height="232" rx="10" stroke-width="1.6"/>
  <text class="accent" x="162" y="106" text-anchor="middle" font-size="16" font-weight="700">Python</text>
  <rect class="card boxstroke" x="40" y="120" width="244" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="162" y="142" text-anchor="middle" font-size="12.5">Controllers · paper + live</text>
  <rect class="card boxstroke" x="40" y="162" width="244" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="162" y="184" text-anchor="middle" font-size="12.5">Backtester · vectorbt + ta-lib</text>
  <rect class="card boxstroke" x="40" y="204" width="244" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="162" y="226" text-anchor="middle" font-size="12.5">Dashboard back end · FastAPI</text>
  <rect class="card boxstroke" x="40" y="246" width="244" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="162" y="268" text-anchor="middle" font-size="12.5">psycopg3 · talks to the database</text>

  <!-- Rust lane -->
  <rect fill="none" class="boxstroke" x="315" y="78" width="276" height="232" rx="10" stroke-width="1.6"/>
  <text class="accent" x="453" y="106" text-anchor="middle" font-size="16" font-weight="700">Rust</text>
  <rect class="card boxstroke" x="331" y="120" width="244" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="453" y="142" text-anchor="middle" font-size="12.5">Data Services · feeds + quotes</text>
  <rect class="card boxstroke" x="331" y="162" width="244" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="453" y="184" text-anchor="middle" font-size="12.5">Redundancy Managers · failover</text>
  <text class="ok" x="453" y="246" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="1.5">FAST · ALWAYS ON</text>

  <!-- JS lane -->
  <rect fill="none" class="boxstroke" x="606" y="78" width="270" height="232" rx="10" stroke-width="1.6"/>
  <text class="accent" x="741" y="106" text-anchor="middle" font-size="15" font-weight="700">JavaScript + React</text>
  <rect class="card boxstroke" x="622" y="120" width="238" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="741" y="142" text-anchor="middle" font-size="12.5">Dashboard front end · React</text>
  <rect class="card boxstroke" x="622" y="162" width="238" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="741" y="184" text-anchor="middle" font-size="12.5">Built with Vite</text>
  <rect class="card boxstroke" x="622" y="204" width="238" height="34" rx="8" stroke-width="1.4"/>
  <text class="label" x="741" y="226" text-anchor="middle" font-size="12.5">Charts · lightweight-charts</text>

  <!-- shared base -->
  <rect class="card boxstroke" x="24" y="344" width="852" height="58" rx="10" stroke-width="1.8"/>
  <text class="label" x="450" y="369" text-anchor="middle" font-size="13">Shared by everything</text>
  <text class="muted" x="430" y="389" text-anchor="end" font-size="11.5">PostgreSQL · storage</text>
  <text class="muted" x="450" y="389" text-anchor="middle" font-size="11.5">·</text>
  <text class="muted" x="470" y="389" text-anchor="start" font-size="11.5">Redis · live cache + messaging</text>

  <line x1="162" y1="310" x2="162" y2="344" class="trailstroke" stroke-width="1.3"/>
  <line x1="453" y1="310" x2="453" y2="344" class="trailstroke" stroke-width="1.3"/>
  <line x1="741" y1="310" x2="741" y2="344" class="trailstroke" stroke-width="1.3"/>

  <text x="450" y="438" text-anchor="middle" font-size="14"><tspan class="muted">Each language does the job it's best at. </tspan><tspan class="accent" font-weight="700" dx="6">nothing picked to look clever.</tspan></text>
</svg>
