<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 250" width="880" height="250" role="img" aria-label="The maturity grade: a volatility-expansion grade from A (most expanded, ripe) through E (dormant), coloured green to red" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .accent { fill: #c0533a; }
      .cellstroke { stroke: #00000022; }
      .gA { fill: #22c55e; } .gB { fill: #14b8a6; } .gC { fill: #f59e0b; } .gD { fill: #f97316; } .gE { fill: #ef4444; } .gN { fill: #888888; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="880" height="250" class="bg"/>
  <text x="865" y="23.5" text-anchor="end" class="watermark" font-size="10.8" font-weight="400" letter-spacing="0.49">hoiboy.uk</text>

  <text x="440" y="34" text-anchor="middle" class="accent" font-size="13" font-weight="700" letter-spacing="2">MATURITY GRADE &#8212; HOW EXPANDED IS THE MOVE?</text>
  <text x="440" y="58" text-anchor="middle" class="muted" font-size="12" letter-spacing="0.5">one volatility-expansion grade per timeframe &#183; graded against its own full history</text>

  <!-- end tags -->
  <text x="104" y="88" text-anchor="middle" class="accent" font-size="11" font-weight="700" letter-spacing="1.5">PEAK / RIPE</text>
  <text x="776" y="88" text-anchor="middle" class="muted" font-size="11" font-weight="700" letter-spacing="1.5">THE OPPOSITE</text>

  <!-- grade cells A..E -->
  <rect x="29"  y="98" width="150" height="74" rx="10" class="gA cellstroke"/>
  <rect x="197" y="98" width="150" height="74" rx="10" class="gB cellstroke"/>
  <rect x="365" y="98" width="150" height="74" rx="10" class="gC cellstroke"/>
  <rect x="533" y="98" width="150" height="74" rx="10" class="gD cellstroke"/>
  <rect x="701" y="98" width="150" height="74" rx="10" class="gE cellstroke"/>

  <text x="104" y="148" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="700">A</text>
  <text x="272" y="148" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="700">B</text>
  <text x="440" y="148" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="700">C</text>
  <text x="608" y="148" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="700">D</text>
  <text x="776" y="148" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="700">E</text>

  <!-- captions -->
  <text x="104" y="196" text-anchor="middle" class="muted" font-size="12">most expanded</text>
  <text x="272" y="196" text-anchor="middle" class="muted" font-size="12">expanding</text>
  <text x="440" y="196" text-anchor="middle" class="muted" font-size="12">middling</text>
  <text x="608" y="196" text-anchor="middle" class="muted" font-size="12">cooling</text>
  <text x="776" y="196" text-anchor="middle" class="muted" font-size="12">dormant / asleep</text>

  <!-- takeaway -->
  <text x="440" y="232" text-anchor="middle" font-size="13.5">
    <tspan class="muted">colour carries the quality:</tspan><tspan class="accent" font-weight="700" dx="6">green = ripe, red = dead.</tspan><tspan class="muted" dx="10">(grey N = not enough data)</tspan>
  </text>
</svg>
