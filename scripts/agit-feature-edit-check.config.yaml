# Configuration for scripts/check-agit-feature-edit.py (hoiboy-uk #48 Phase 2).
#
# ALL word lists and thresholds live here, never hardcoded in the script
# (Engineering Requirement: No Hardcoded Settings). Edit this file to tune the
# edit-check without touching code.
#
# The check FLAGS candidates for a human editor to clear. It does NOT decide
# "meaning changed". Bias the lists toward catching tells, not toward silence.

# Hedge phrases. When one of these is present in the ORIGINAL but gone from the
# EDITED version, a subjective statement may have been sharpened into an
# assertion of fact (the core defamation-safety tell). Matched case-insensitively
# on word boundaries; multi-word phrases are matched as a whole.
hedge_phrases:
  - "I felt"
  - "I feel"
  - "I think"
  - "I thought"
  - "I believe"
  - "I reckon"
  - "I guess"
  - "I suppose"
  - "in my experience"
  - "in my opinion"
  - "as far as I know"
  - "as I remember it"
  - "to my knowledge"
  - "allegedly"
  - "apparently"
  - "seemingly"
  - "probably"
  - "perhaps"
  - "maybe"
  - "sort of"
  - "kind of"

# Punctuation that must NEVER appear in an edited feature. Em-dash removal is the
# one always-applied transform (CI hard-fails these site-wide), so any still
# present in the EDITED text is a flag. Stored as ASCII hex codepoints so no
# literal dash byte lands in this tracked file (the em-dash zero-tolerance guard);
# the script maps each codepoint to its character at load time.
banned_punctuation_codepoints:
  - 0x2014  # em dash
  - 0x2013  # en dash
  - 0x2012  # figure dash
  - 0x2212  # minus sign
  - 0x2015  # horizontal bar

# Capitalised tokens that are NOT names/places, so a recapitalised sentence
# start (or a common word) is not mistaken for an added proper noun. The check
# ALSO ignores any token whose lower-case form already appeared anywhere in the
# original, so this list only needs the genuinely-common capitalised words.
proper_noun_stopwords:
  # NOTE: real given names/surnames are deliberately NOT listed here even when they
  # coincide with an English function word (e.g. "An", "So", "No" are common
  # Vietnamese/Korean/Chinese names). The named-person gate must OVER-include (a
  # human clears each) rather than silently drop a real person. A sentence-initial
  # "So," surfacing as a name is harmless over-flagging; a missed "So"-the-person
  # is a legal-safety gap. Keep only words that are essentially never personal names.
  - "I"
  - "A"
  - "The"
  - "This"
  - "That"
  - "These"
  - "Those"
  - "We"
  - "You"
  - "They"
  - "He"
  - "She"
  - "It"
  - "My"
  - "Our"
  - "Your"
  - "Their"
  - "And"
  - "But"
  - "Or"
  - "If"
  - "When"
  - "While"
  - "Because"
  - "After"
  - "Before"
  - "Then"
  - "There"
  - "Here"
  - "What"
  - "Why"
  - "How"
  - "Yes"
  - "OK"

# Thresholds.
thresholds:
  # Flag when the edited word count differs from the original by more than this
  # percentage (a large cut or expansion is a form-vs-facts risk worth a look).
  length_delta_pct: 40

# Phase 4 email-approval reply detection (scripts/agit_approval.py). A member's
# reply approves the exact final wording ONLY if it contains an affirmative
# phrase AND no negation phrase. Fail-safe: anything ambiguous is NOT approval,
# so no approval means no publish. Matched case-insensitively as substrings.
approval:
  affirmative_phrases:
    - "approved"
    - "i approve"
    - "approve it"
    - "approve this"
    - "approve to publish"
    - "yes approve"
    - "yes, approve"
    - "yes publish"
    - "yes, publish"
    - "happy to publish"
    - "happy for you to publish"
    - "go ahead and publish"
    - "you can publish"
    - "publish it"
  negation_phrases:
    # Any of these in a reply means NOT approved (negation wins over any affirmative).
    # Includes plain-English refusals a member may use after an earlier approval, so a
    # later refusal supersedes it (fail-safe). Deliberately conservative: a convoluted
    # approval that contains a refusal word (e.g. "don't hold off, publish it") is
    # blocked, not published -- the operator confirms edge phrasings.
    - "unapproved"
    - "not approved"
    - "not approve"
    - "don't approve"
    - "do not approve"
    - "cannot approve"
    - "can't approve"
    - "won't approve"
    - "disapprove"
    - "decline"
    # Whole-word matching means the base verbs above do NOT match their inflected
    # forms, so each real reply wording a member may use is listed explicitly --
    # otherwise a later "I'm withdrawing my approval" is not decisive and fails to
    # supersede an earlier approval (a dangerous direction on a legal publish gate).
    - "declined"
    - "declining"
    - "cancel"
    - "cancelled"
    - "canceled"
    - "cancelling"
    - "canceling"
    - "withdraw"
    - "withdrawn"
    - "withdrawing"
    - "withdrawal"
    - "refuse"
    - "reject"
    - "retract"
    - "not happy"
    - "hold off"
    - "not yet"
    - "don't publish"
    - "do not publish"
    - "don't go ahead"
    - "do not go ahead"
    - "don't proceed"
    - "do not proceed"
    - "please wait"
    - "some changes"
    - "one change"
    - "hold on"
    # Generic negation cues. Precision over recall: an approval reply that carries
    # ANY of these is treated as NOT approved, because a refusal can put filler
    # between the cue and the verb ("I don't think you should approve this",
    # "I'm not sure I want you to publish it") which the exact-phrase rules above
    # miss. A clean approval ("approved", "yes, approve", "happy to publish") has
    # none of these; anything nuanced enough to contain one gets human confirmation.
    - "not"
    - "don't"
    - "do not"
    - "never"
    - "won't"
    - "will not"
    - "can't"
    - "cannot"
    - "shouldn't"
    - "should not"
    - "wouldn't"
    - "would not"
    # Conditional cues. A reply that approves ON A CONDITION ("I approve, as long as
    # you cut my last name") is NOT an unconditional approval of the exact wording --
    # the condition is unmet until a fresh edit + fresh approval. Treated as NOT
    # approved (fail-safe, blocks); the operator reads the reply, applies the change,
    # re-sends the corrected wording, and gets a clean approval. Without these, an
    # affirmative-plus-condition reply would wrongly clear as full approval.
    - "as long as"
    - "so long as"
    - "provided that"
    - "provided you"
    - "on condition"
    - "only if"
    - "once you"
    - "assuming"
    - "unless"
    # Deferral / temporal / hypothetical cues. Sibling of the conditional cues above:
    # a reply that carries an affirmative phrase but DEFERS ("let me think before I
    # approve it", "I would approve it but I need a day", "before you publish, can we
    # chat?", "I'll let you know when to publish", "once I've checked with my manager
    # you can publish it") is NOT a present, unconditional approval and must block
    # (fail-safe; the operator reads it and re-sends for a clean approval).
    #
    # These cues are deliberately NARROW: only phrasings that a genuine PRESENT
    # approval essentially never contains. We do NOT try to enumerate every deferral
    # wording -- natural language is unbounded and each over-broad cue wrongly blocks
    # a real approval that merely mentions narrative context ("I checked with my
    # manager, approved!", "before you ask, yes I approve", "once I've read it twice,
    # approved", "approved -- can we chat about the next one?"). Over-blocking a real
    # approval defeats the gate's purpose (auto-clearing clean approvals) and there is
    # no operator override. So we keep only unambiguous deferrals here and rely on the
    # mandatory operator read of the verbatim reply (SKILL.md) to catch the ambiguous
    # tail (e.g. "once I've checked with my manager, you can publish it"), rather than
    # over-block. Precision over recall, with the human read as the recall backstop.
    - "let me think"
    - "think it over"
    - "sleep on it"
    - "need a day"
    - "need more time"
    - "need some time"
    - "before you publish"
    - "when to publish"
    - "let you know when"
