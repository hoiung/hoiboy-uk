<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" role="img" aria-label="Text on the left is chopped into token chunks that flow into a tall context window on the right. The window is banded bottom to top: a green healthy zone, a grey accuracy-drifts zone, and a terracotta overfilled hallucination-risk zone, with a dashed marker showing where Hoi compacts, well before full. Up to one million tokens. Full is not better." font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .okstroke { stroke: #7aa869; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
      }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" class="accent"/></marker>
  </defs>

  <rect x="0" y="0" width="900" height="480" class="bg"/>
  <text x="885" y="24" text-anchor="end" class="watermark" font-size="11" font-weight="400" letter-spacing="0.5">hoiboy.uk</text>

  <text x="450" y="34" text-anchor="middle" class="accent" font-size="14" font-weight="700" letter-spacing="2.5">TOKENS &amp; THE CONTEXT WINDOW</text>
  <text x="450" y="56" text-anchor="middle" class="muted" font-size="12" letter-spacing="0.5">the AI's working memory for one chat, measured in tokens</text>

  <!-- LEFT: text becomes tokens -->
  <text x="210" y="192" text-anchor="middle" class="muted" font-size="11" font-weight="600" letter-spacing="1.5">YOUR TEXT, IN CHUNKS</text>
  <g font-size="13">
    <rect x="95" y="212" width="64" height="32" rx="6" class="card"/><rect x="95" y="212" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="127" y="233" text-anchor="middle" class="label">The</text>
    <rect x="167" y="212" width="64" height="32" rx="6" class="card"/><rect x="167" y="212" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="199" y="233" text-anchor="middle" class="label">cat</text>
    <rect x="239" y="212" width="64" height="32" rx="6" class="card"/><rect x="239" y="212" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="271" y="233" text-anchor="middle" class="label">sat</text>
    <rect x="95" y="254" width="64" height="32" rx="6" class="card"/><rect x="95" y="254" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="127" y="275" text-anchor="middle" class="label">on</text>
    <rect x="167" y="254" width="64" height="32" rx="6" class="card"/><rect x="167" y="254" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="199" y="275" text-anchor="middle" class="label">the</text>
    <rect x="239" y="254" width="64" height="32" rx="6" class="card"/><rect x="239" y="254" width="64" height="32" rx="6" fill="none" class="boxstroke"/><text x="271" y="275" text-anchor="middle" class="label">mat</text>
  </g>
  <text x="210" y="312" text-anchor="middle" class="muted" font-size="11">a word, part of a word, a comma... all tokens</text>

  <!-- arrow into the window -->
  <path d="M315,250 L548,250" fill="none" class="accentstroke" stroke-width="2" marker-end="url(#ah)"/>
  <text x="430" y="240" text-anchor="middle" class="muted" font-size="11">they fill it up</text>

  <!-- RIGHT: the context window -->
  <text x="615" y="104" text-anchor="middle" class="muted" font-size="11" font-weight="600" letter-spacing="1.5">CONTEXT WINDOW</text>
  <!-- zones (bottom healthy -> top danger) -->
  <rect x="560" y="290" width="110" height="120" class="ok" fill-opacity="0.20"/>
  <rect x="560" y="190" width="110" height="100" class="muted" fill-opacity="0.16"/>
  <rect x="560" y="124" width="110" height="66" class="accent" fill-opacity="0.16"/>
  <rect x="560" y="124" width="110" height="286" fill="none" class="boxstroke" stroke-width="1.5"/>
  <!-- compact marker -->
  <path d="M560,290 L678,290" fill="none" class="accentstroke" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="552" y="294" text-anchor="end" class="accent" font-size="11" font-weight="600">I compact here</text>
  <text x="552" y="308" text-anchor="end" class="muted" font-size="10">well before full</text>
  <!-- zone labels -->
  <text x="684" y="154" class="accent" font-size="12" font-weight="700">overfilled</text>
  <text x="684" y="169" class="muted" font-size="10">hallucination risk</text>
  <text x="684" y="244" class="muted" font-size="12">accuracy drifts</text>
  <text x="684" y="354" class="ok" font-size="12" font-weight="700">healthy</text>
  <text x="615" y="430" text-anchor="middle" class="muted" font-size="11">up to 1,000,000 tokens</text>

  <text x="450" y="464" text-anchor="middle" font-size="13.5"><tspan class="accent" font-weight="700">Full is not better.</tspan><tspan class="muted" dx="6">Stuff it and the AI gets dumber, not smarter.</tspan></text>
</svg>
