<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" role="img" aria-label="The prompt 'the cat sat on the' points to a ranked list of candidate next words with probability bars: mat 61 percent and most likely picked, sofa 18 percent, floor 9 percent, roof 2 percent. A temperature gauge on the right runs from low and safe to high and wild. Temperature zero does not make it predictable; the odds sharpen but the dice are still dice." font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .card { fill: #ffffff; }
      .label { fill: #1a1a1a; font-weight: 600; }
      .muted { fill: #6a6a6a; }
      .mutedfill { fill: #6a6a6a; }
      .boxstroke { stroke: #9aa0a6; }
      .accent { fill: #c0533a; }
      .accentstroke { stroke: #c0533a; }
      .ok { fill: #7aa869; }
      .watermark { fill: #87ceeb; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #141414; }
        .card { fill: #1f1f1f; }
        .label { fill: #f0f0f0; }
        .muted { fill: #a6a6a6; }
        .mutedfill { fill: #a6a6a6; }
        .boxstroke { stroke: #6a6a6a; }
      }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" class="accent"/></marker>
  </defs>

  <rect x="0" y="0" width="900" height="360" class="bg"/>
  <text x="885" y="24" text-anchor="end" class="watermark" font-size="11" font-weight="400" letter-spacing="0.5">hoiboy.uk</text>

  <text x="450" y="34" text-anchor="middle" class="accent" font-size="14" font-weight="700" letter-spacing="2.5">NEXT-TOKEN PREDICTION</text>
  <text x="450" y="56" text-anchor="middle" class="muted" font-size="12" letter-spacing="0.5">it doesn't think out a sentence, it rolls a weighted dice for the next word</text>

  <!-- prompt -->
  <rect x="55" y="170" width="190" height="46" rx="10" class="card"/><rect x="55" y="170" width="190" height="46" rx="10" fill="none" class="boxstroke"/>
  <text x="150" y="199" text-anchor="middle" class="label" font-size="13">the cat sat on the ___</text>
  <text x="150" y="240" text-anchor="middle" class="muted" font-size="11">what comes next?</text>
  <path d="M255,193 L352,193" fill="none" class="accentstroke" stroke-width="2" marker-end="url(#ah)"/>

  <!-- candidate bars -->
  <g font-size="13">
    <text x="392" y="158" text-anchor="end" class="label">mat</text>
    <rect x="402" y="146" width="150" height="17" rx="3" class="accent"/>
    <text x="562" y="158" class="accent" font-weight="700">61%</text>
    <text x="610" y="158" class="muted" font-size="11">usually picked</text>

    <text x="392" y="190" text-anchor="end" class="label">sofa</text>
    <rect x="402" y="178" width="44" height="17" rx="3" class="mutedfill" fill-opacity="0.55"/>
    <text x="456" y="190" class="muted">18%</text>

    <text x="392" y="222" text-anchor="end" class="label">floor</text>
    <rect x="402" y="210" width="22" height="17" rx="3" class="mutedfill" fill-opacity="0.55"/>
    <text x="434" y="222" class="muted">9%</text>

    <text x="392" y="254" text-anchor="end" class="label">roof</text>
    <rect x="402" y="242" width="6" height="17" rx="2" class="mutedfill" fill-opacity="0.55"/>
    <text x="418" y="254" class="muted">2%</text>
  </g>
  <text x="402" y="288" class="muted" font-size="11">rank every option, then pick one off a weighted dice. fresh roll, every word.</text>

  <!-- temperature gauge -->
  <text x="780" y="150" text-anchor="middle" class="accent" font-size="11" font-weight="700" letter-spacing="1.5">TEMPERATURE</text>
  <path d="M725,220 A55,55 0 0 1 835,220" fill="none" class="boxstroke" stroke-width="2.5"/>
  <line x1="780" y1="220" x2="747" y2="182" class="accentstroke" stroke-width="2.5"/>
  <circle cx="780" cy="220" r="5" class="accent"/>
  <text x="722" y="238" text-anchor="middle" class="muted" font-size="10">low</text>
  <text x="722" y="250" text-anchor="middle" class="muted" font-size="10">safe</text>
  <text x="838" y="238" text-anchor="middle" class="muted" font-size="10">high</text>
  <text x="838" y="250" text-anchor="middle" class="muted" font-size="10">wild</text>

  <text x="450" y="336" text-anchor="middle" font-size="13.5"><tspan class="accent" font-weight="700">Temperature 0 won't save you.</tspan><tspan class="muted" dx="6">The odds sharpen, the dice are still dice.</tspan></text>
</svg>
