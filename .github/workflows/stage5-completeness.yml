# Stage 5 completeness Layer B failsafe (#460 Phase 7b W4)
# Server-side replay of the Layer A gate after a Stage 5 sign-off comment is posted.
# Catches the case where an agent forgets to invoke `leader-stage5-completeness-check.sh`
# pre-flight: the workflow runs the same gate, posts a PASS/FAIL receipt comment.
#
# Trigger: issue_comment.created. Filter by sign-off heading regex in body.
#
# Note (cross-repo gap): issue_comment.created fires PER-REPO. This workflow at
# dotfiles only catches sign-off comments on dotfiles Issues. For consumer-repo
# Issues, the same YAML is propagated via SST3/drift-manifest.json (#460 AC 7b.5).
name: Stage 5 completeness (Layer B failsafe)

on:
  issue_comment:
    types: [created]
  # workflow_dispatch enables manual re-run against an arbitrary Issue
  # (per AC 11.9). The auto-fire path remains issue_comment.created.
  workflow_dispatch:
    inputs:
      issue:
        description: 'Issue number to re-run gate against'
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  replay-gate:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '## Stage 5 — Post-Implementation Review') ||
      contains(github.event.comment.body, '### Stage 5 — Post-Implementation Review') ||
      contains(github.event.comment.body, 'Stage 5 (Post-Implementation Review) complete')
    steps:
      - name: Checkout dotfiles canonical (gate script + helpers live here)
        uses: actions/checkout@v7
        with:
          repository: hoiung/dotfiles
          ref: master
          path: dotfiles
          # Cross-repo private-repo checkout requires a fine-grained PAT
          # (#473 / #477 Phase 8). DOTFILES_READ_TOKEN is scoped Contents:Read
          # on hoiung/dotfiles ONLY. An EMPTY token input does NOT no-op —
          # actions/checkout hard-fails with "Input required and not supplied:
          # token". The `|| github.token` fallback makes harness-side (this
          # repo IS hoiung/dotfiles, same-repo read) runs work via the default
          # GITHUB_TOKEN; consumer-side runs use the PAT for cross-repo private
          # read (their GITHUB_TOKEN is repo-scoped to the consumer).
          token: ${{ secrets.DOTFILES_READ_TOKEN || github.token }}

      # Issue #493 AC 2.9 — second checkout of the actor (consumer) repo so the
      # drain-gate's D1-D4 git-state queries (status / stash / worktree /
      # rev-list origin/<br>..<br>) hit the consumer's working tree. The default
      # github.token grants Contents:Read on the consumer's own repo; no PAT.
      # Skipped when the actor IS dotfiles to avoid clobbering the canonical
      # checkout above (drain-check then resolves --repo dotfiles to the
      # canonical checkout, which is post-merge master state — correct for
      # post-sign-off replay).
      - name: Checkout actor (consumer) repo (D1-D4 source — #493 AC 2.9)
        if: github.event.repository.name != 'dotfiles'
        uses: actions/checkout@v7
        with:
          # No 'repository' arg = default to github.repository = actor repo.
          # Path matches drain-check's --repo <slug> resolution so
          # `<workspace>/<slug>` is reachable as the per-repo working tree.
          path: ${{ github.event.repository.name }}
          fetch-depth: 0  # full history so git rev-list origin/<br>..<br> works

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pyyaml (feedback_parser dep)
        run: pip install --quiet pyyaml

      - name: Whole-corpus feedback #486 silent-rot catch (non-swallowed; #488 AC 3.2(i-a))
        # The commit-stage `sst3-metrics-feedback-drift` hook is now PER-FILE
        # (#488 AC 3.2) so a feedback file broken in an EARLIER commit no
        # longer fails a later per-file commit — that is the intended
        # bystander-unblocking. This step is the RETAINED whole-corpus
        # silent-rot catch the dotfiles#486 governance invariant requires:
        # `--summarize` internally forces `regenerate_index --rebuild`
        # (leader-feedback-aggregate.sh ~424 — bypassing the md5/mtime
        # short-circuits that masked an earlier breakage) and returns the
        # HARD parse/validate verdict ONLY (advisory DRIFT stays exit-0 by
        # construction). DELIBERATELY no `continue-on-error`: a corpus-wide
        # parse failure FAILS this job — this is the non-swallowed exit-coded
        # invocation AC 3.2(i) mandates, distinct from the AC 2.3 `|| true`
        # C6-feeding prepend (which a swallowed --rebuild cannot fail-catch).
        working-directory: dotfiles
        run: bash SST3/scripts/leader-feedback-aggregate.sh --summarize

      - name: Compute Issue + repo slug
        id: meta
        run: |
          # owner/repo split (e.g. hoiung/dotfiles -> dotfiles)
          repo_slug=$(echo "${{ github.repository }}" | cut -d/ -f2)
          # workflow_dispatch supplies issue via input; issue_comment via event.
          issue_num="${{ github.event.inputs.issue || github.event.issue.number }}"
          echo "issue=$issue_num" >> "$GITHUB_OUTPUT"
          echo "repo=$repo_slug" >> "$GITHUB_OUTPUT"

      - name: Run Stage 5 completeness gate
        id: gate
        continue-on-error: true
        working-directory: dotfiles
        run: |
          set +e
          OUT=$(bash SST3/scripts/leader-stage5-completeness-check.sh \
                  "${{ steps.meta.outputs.issue }}" \
                  --repo "${{ steps.meta.outputs.repo }}" 2>err.log)
          EX=$?
          {
            echo 'json<<EOF'
            echo "$OUT"
            echo 'EOF'
            echo "exit=$EX"
            echo 'err<<EOF'
            cat err.log
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # Issue #493 AC 2.9 — drain-gate gate runs after the completeness gate;
      # results merged into ONE consolidated receipt comment below so the
      # Issue doesn't accumulate dual-receipt noise (Stage-1 G7 design choice).
      - name: Run Stage 5 drain gate (#493 Phase 2)
        id: drain
        continue-on-error: true
        working-directory: dotfiles
        run: |
          set +e
          # --issue-repo wired from github.repository so any future
          # --waive-residue invocation posts the HTML-comment receipt to
          # the ACTOR's Issue (consumer-side or dotfiles-side), not the
          # script default. Ralph Tier 3 (Opus) cross-repo hardening fix.
          OUT=$(bash SST3/scripts/leader-stage5-drain-check.sh \
                  "${{ steps.meta.outputs.issue }}" \
                  --repo "${{ steps.meta.outputs.repo }}" \
                  --issue-repo "${{ github.repository }}" 2>err.log)
          EX=$?
          {
            echo 'json<<EOF'
            echo "$OUT"
            echo 'EOF'
            echo "exit=$EX"
            echo 'err<<EOF'
            cat err.log
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post combined receipt comment to Issue (#493 AC 2.9)
        uses: actions/github-script@v9
        env:
          # Stage 5 L1-G F4 + L1-F FRAG-2 fix: pass step outputs via env vars
          # instead of inline `${{ ... }}` template-literal interpolation.
          # The pre-fix path interpolated drain-check / completeness-check
          # JSON + err blobs directly into JS backtick template literals,
          # which would break parsing (and could inject arbitrary JS) if any
          # output contained backticks or `${...}` sequences. GitHub Actions
          # `env:` provides full escaping — `process.env.X` reads the value
          # as a verbatim string with no JS-template-literal expansion.
          COMP_EX: ${{ steps.gate.outputs.exit }}
          COMP_JSON: ${{ steps.gate.outputs.json }}
          COMP_ERR: ${{ steps.gate.outputs.err }}
          DRAIN_EX: ${{ steps.drain.outputs.exit }}
          DRAIN_JSON: ${{ steps.drain.outputs.json }}
          DRAIN_ERR: ${{ steps.drain.outputs.err }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue }}
        with:
          script: |
            const compEx = process.env.COMP_EX || '';
            const compJson = process.env.COMP_JSON || '';
            const compErr = process.env.COMP_ERR || '';
            const drainEx = process.env.DRAIN_EX || '';
            const drainJson = process.env.DRAIN_JSON || '';
            const drainErr = process.env.DRAIN_ERR || '';
            const issueNumber = parseInt(process.env.ISSUE_NUM || '0', 10);
            const compVerdict = compEx === '0' ? 'PASS' : 'FAIL';
            const drainVerdict = drainEx === '0' ? 'PASS' : 'FAIL';
            const overall = (compEx === '0' && drainEx === '0') ? 'PASS' : 'FAIL';
            const body = [
              `## Stage 5 — Completeness + Drain Gates (Layer B replay): ${overall}`,
              '',
              '_Server-side replay of both Layer-A gates after the Stage 5 sign-off comment was posted._',
              '',
              `### Completeness gate (\`leader-stage5-completeness-check.sh\`): ${compVerdict}`,
              '',
              '```json',
              compJson.trim() || '(no JSON output)',
              '```',
              compEx !== '0' ? '\n**Completeness failure detail:**\n```\n' + compErr.trim() + '\n```' : '',
              '',
              `### Drain gate (\`leader-stage5-drain-check.sh\`): ${drainVerdict}`,
              '',
              '```json',
              drainJson.trim() || '(no JSON output)',
              '```',
              drainEx !== '0' ? '\n**Drain failure detail:**\n```\n' + drainErr.trim() + '\n```' : '',
              '',
              '_Issue #460 Phase 7b W4 + #493 Phase 2 — `.github/workflows/stage5-completeness.yml`._',
            ].join('\n');
            if (!issueNumber) {
              core.setFailed(`ISSUE_NUM env var missing or invalid: ${process.env.ISSUE_NUM}`);
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
